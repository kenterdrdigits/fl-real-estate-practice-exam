<style>
  :root{
    --navy:#0a4d68; --teal:#088395; --sky:#05bfdb; --bg:#f3f6f8;
    --green:#1e8e3e; --green-bg:#e6f4ea; --green-bd:#34a853;
    --red:#c5221f; --red-bg:#fce8e6; --red-bd:#ea4335;
    --ink:#1f2d33; --muted:#5f7178; --card:#ffffff; --line:#dde6ea;
    --amber:#946200; --amber-bg:#fff6e0; --amber-bd:#f0c14b;

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.45;
    padding:0 0 40px; -webkit-font-smoothing:antialiased;
  }
  header{
    background:linear-gradient(135deg,var(--navy),var(--teal));
    color:#fff; padding:16px 18px 14px; position:sticky; top:0; z-index:10;
    box-shadow:0 2px 10px rgba(0,0,0,.12);
  }
  header h1{font-size:15px; margin:0 0 10px; font-weight:700; letter-spacing:.2px;}
  .meta{display:flex; justify-content:space-between; align-items:center; font-size:13px; font-weight:600;}
  .meta .score{background:rgba(255,255,255,.18); padding:3px 10px; border-radius:20px;}
  .progress{height:7px; background:rgba(255,255,255,.25); border-radius:6px; margin-top:10px; overflow:hidden;}
  .progress > div{height:100%; width:0; background:var(--sky); border-radius:6px; transition:width .3s ease;}
  .switch{text-align:center;padding:9px 12px;background:#e3f2f5;font-size:13px;}
  .switch a{color:var(--navy);font-weight:700;text-decoration:none;}
  .switch a.cur{color:var(--teal);text-decoration:underline;}
  main{max-width:680px; margin:0 auto; padding:18px 16px 0;}
  .domain{display:inline-block; font-size:11px; font-weight:700; text-transform:uppercase;
    letter-spacing:.5px; color:var(--teal); background:#e3f2f5; padding:4px 9px; border-radius:6px; margin-bottom:12px;}
  .qtext{font-size:18px; font-weight:600; margin:0 0 18px; line-height:1.4;}
  .choices{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:11px;}
  .choice{
    display:flex; align-items:flex-start; gap:11px; background:var(--card);
    border:2px solid var(--line); border-radius:13px; padding:14px 15px; cursor:pointer;
    font-size:16px; transition:border-color .15s, background .15s; user-select:none;
  }
  .choice:active{transform:scale(.995);}
  .choice .letter{
    flex:0 0 26px; height:26px; border-radius:50%; background:#eef3f5; color:var(--navy);
    font-weight:700; font-size:14px; display:flex; align-items:center; justify-content:center; margin-top:1px;
  }
  .choice .ctext{flex:1;}
  .choice.correct{border-color:var(--green-bd); background:var(--green-bg);}
  .choice.correct .letter{background:var(--green-bd); color:#fff;}
  .choice.wrong{border-color:var(--red-bd); background:var(--red-bg);}
  .choice.wrong .letter{background:var(--red-bd); color:#fff;}
  .choice.dim{opacity:.85;}
  .answered .choice{cursor:default;}
  .expl{font-size:13.5px; margin-top:9px; padding-left:37px; display:none; line-height:1.4;}
  .answered .expl{display:block;}
  .expl.good{color:var(--green);}
  .expl.bad{color:var(--red);}
  .verdict{margin:18px 0 4px; font-weight:700; font-size:16px; display:none;}
  .answered .verdict{display:block;}
  .verdict.good{color:var(--green);} .verdict.bad{color:var(--red);}
  .work{display:none; margin:14px 0 2px; background:var(--amber-bg); border:1.5px solid var(--amber-bd);
    border-radius:12px; padding:13px 15px;}
  .answered .work{display:block;}
  .work .wt{font-weight:800; font-size:13px; color:var(--amber); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px;}
  .work ol{margin:0; padding-left:20px;}
  .work li{font-size:14.5px; margin:5px 0; line-height:1.5; font-variant-numeric:tabular-nums;}
  .work li b{color:var(--ink);}
  .nav{margin:22px 0 8px; display:flex; gap:12px;}
  button.btn{
    flex:1; border:none; border-radius:12px; padding:15px; font-size:16px; font-weight:700;
    background:var(--navy); color:#fff; cursor:pointer; transition:opacity .15s, background .15s;
  }
  button.btn.secondary{background:#e0e8ec; color:var(--navy);}
  button.btn.next{display:none;}
  .answered ~ .nav button.btn.next{display:block;}
  #results{display:none;}
  .result-card{background:var(--card); border-radius:16px; padding:24px 20px; text-align:center; box-shadow:0 2px 10px rgba(0,0,0,.06);}
  .result-score{font-size:54px; font-weight:800; margin:6px 0;}
  .result-card.pass .result-score{color:var(--green);}
  .result-card.fail .result-score{color:var(--red);}
  .result-badge{display:inline-block; font-size:15px; font-weight:800; padding:7px 18px; border-radius:30px; text-transform:uppercase; letter-spacing:1px;}
  .result-card.pass .result-badge{background:var(--green-bg); color:var(--green);}
  .result-card.fail .result-badge{background:var(--red-bg); color:var(--red);}
  .result-sub{color:var(--muted); font-size:14px; margin-top:10px;}
  h3.bd{font-size:15px; margin:26px 0 10px; color:var(--navy);}
  table.dom{width:100%; border-collapse:collapse; font-size:13.5px; background:var(--card); border-radius:12px; overflow:hidden;}
  table.dom td{padding:10px 12px; border-bottom:1px solid var(--line); vertical-align:middle;}
  table.dom tr:last-child td{border-bottom:none;}
  table.dom td.pct{text-align:right; font-weight:700; white-space:nowrap;}
  .pct.lo{color:var(--red);} .pct.mid{color:#c77800;} .pct.hi{color:var(--green);}
  .barwrap{background:#eef3f5; height:6px; border-radius:4px; margin-top:5px; overflow:hidden;}
  .barwrap>div{height:100%; border-radius:4px;}
  .footnote{font-size:12px; color:var(--muted); text-align:center; margin:24px 8px 0; line-height:1.5;}
</style>

/* =========================================================================
   FOCUSED WEAK-AREAS DRILL — SET B (50 Q). All-new questions/numbers vs Set A.

   Choice: t=text, e=why right/wrong, k=correct.  Optional work=[steps].

const BANK = [

/* ===== COMPUTATIONS & CLOSING (12) ===== */
{d:"Computations & Closing",q:"A property sells for $268,340. Deed doc stamps are $0.70 per $100, and any fraction of $100 rounds UP. The deed doc-stamp tax is:",
 work:["Round price UP to the next $100: $268,340 → <b>$268,400</b>","$268,400 ÷ $100 = <b>2,684</b> units","2,684 × $0.70 = <b>$1,878.80</b>"],ch:[
 {t:"$1,878.80",e:"After rounding up to $268,400, 2,684 × $0.70 = $1,878.80 — correct.",k:true},
 {t:"$1,878.38",e:"This skipped rounding the fraction up to the next $100.",k:false},
 {t:"$939.40",e:"That uses the $0.35 note rate, not the $0.70 deed rate.",k:false},
 {t:"$2,684.00",e:"That is just the unit count, not the tax.",k:false}]},

{d:"Computations & Closing",q:"A buyer signs a new $415,000 mortgage/note. Find the TOTAL of the note doc stamps ($0.35/$100) plus the intangible tax ($0.002).",
 work:["Note stamps: $415,000 ÷ 100 = 4,150 × $0.35 = <b>$1,452.50</b>","Intangible: $415,000 × 0.002 = <b>$830.00</b>","Total = $1,452.50 + $830.00 = <b>$2,282.50</b>"],ch:[
 {t:"$2,282.50",e:"$1,452.50 note stamps + $830 intangible = $2,282.50 — correct.",k:true},
 {t:"$1,452.50",e:"That is only the note doc stamps; add the intangible tax.",k:false},
 {t:"$830.00",e:"That is only the intangible tax; add the note doc stamps.",k:false},
 {t:"$3,735.00",e:"That wrongly uses the $0.70 deed rate on the note.",k:false}]},

{d:"Computations & Closing",q:"A new mortgage is $510,000. The Florida intangible tax is 2 mills ($0.002 per $1). The intangible tax is:",
 work:["Rate = 2 mills = <b>$0.002</b> per $1","$510,000 × 0.002 = <b>$1,020.00</b>"],ch:[
 {t:"$1,020.00",e:"$510,000 × 0.002 = $1,020 — correct.",k:true},
 {t:"$1,785.00",e:"That uses the $0.35/$100 note rate, not the intangible rate.",k:false},
 {t:"$510.00",e:"That is only 1 mill; the rate is 2 mills.",k:false},
 {t:"$10,200.00",e:"Decimal slip — 2 mills is $0.002, not $0.02.",k:false}]},

{d:"Computations & Closing",q:"A seller PREPAID the full $2,920 annual tax (365-day method). At closing the buyer will own the property 250 days of the year. The proration is:",
 work:["Daily rate = $2,920 ÷ 365 = <b>$8.00/day</b>","Buyer's 250 days: 250 × $8 = <b>$2,000</b>","Seller prepaid → buyer reimburses → <b>CREDIT seller, DEBIT buyer</b>"],ch:[
 {t:"$2,000 credit to the seller",e:"Seller prepaid, so the buyer reimburses the seller's 250-day share — credit seller / debit buyer, correct.",k:true},
 {t:"$2,000 debit to the seller",e:"Reversed — a prepaid item is a credit to the seller.",k:false},
 {t:"$920 credit to the seller",e:"That uses 115 days; the buyer owns 250 days.",k:false},
 {t:"$8 credit to the seller",e:"$8 is only the daily rate, not the 250-day total.",k:false}]},

{d:"Computations & Closing",q:"A total commission of $26,400 was charged at a 6% rate. The property's sale price was:",
 work:["Sale price = commission ÷ rate","$26,400 ÷ 0.06 = <b>$440,000</b>"],ch:[
 {t:"$440,000",e:"$26,400 ÷ 0.06 = $440,000 — correct.",k:true},
 {t:"$1,584",e:"That multiplies by 6% again instead of dividing.",k:false},
 {t:"$44,000",e:"Off by a factor of 10.",k:false},
 {t:"$158,400",e:"That subtracts the commission instead of solving for price.",k:false}]},

{d:"Computations & Closing",q:"Sale price $750,000, commission 4%, split 50/50. The listing broker pays its associate 60% of its half. The associate receives:",
 work:["Total commission: $750,000 × 0.04 = <b>$30,000</b>","Listing side's half: $30,000 ÷ 2 = <b>$15,000</b>","Associate's 60%: $15,000 × 0.60 = <b>$9,000</b>"],ch:[
 {t:"$9,000",e:"60% of the $15,000 half = $9,000 — correct.",k:true},
 {t:"$15,000",e:"That is the full half, before the associate's 60% split.",k:false},
 {t:"$6,000",e:"That is the broker's retained 40%, not the associate's share.",k:false},
 {t:"$18,000",e:"That takes 60% of the entire commission, not one half.",k:false}]},

{d:"Computations & Closing",q:"A $480,000 loan carries 6% annual interest. Using a 360-day year, the borrower owes prepaid interest for 15 days at closing. The amount is:",
 work:["Annual interest = $480,000 × 0.06 = <b>$28,800</b>","Daily (360-day) = $28,800 ÷ 360 = <b>$80/day</b>","15 days × $80 = <b>$1,200</b>"],ch:[
 {t:"$1,200",e:"$80/day × 15 days = $1,200 — correct.",k:true},
 {t:"$80",e:"That is only one day of interest.",k:false},
 {t:"$2,400",e:"That uses 30 days; the problem says 15.",k:false},
 {t:"$4,800",e:"Not a valid result for 15 days.",k:false}]},

{d:"Computations & Closing",q:"A buyer purchases a $540,000 home with an 80% loan-to-value loan. The down payment is:",
 work:["Loan = $540,000 × 0.80 = <b>$432,000</b>","Down payment = $540,000 − $432,000 = <b>$108,000</b>"],ch:[
 {t:"$108,000",e:"$540,000 − $432,000 loan = $108,000 down — correct.",k:true},
 {t:"$432,000",e:"That is the loan amount, not the down payment.",k:false},
 {t:"$54,000",e:"That is only 10% of the price.",k:false},
 {t:"$135,000",e:"That uses a 75% LTV, not 80%.",k:false}]},

{d:"Computations & Closing",q:"A home listed at $480,000 sells for $456,000. It sold for what percent of the list price?",
 work:["% of list = sale price ÷ list price","$456,000 ÷ $480,000 = 0.95 = <b>95%</b>"],ch:[
 {t:"95%",e:"$456,000 ÷ $480,000 = 95% — correct.",k:true},
 {t:"105%",e:"That divides list by sale; it sold BELOW list.",k:false},
 {t:"5%",e:"5% is the discount off list, not the percent of list.",k:false},
 {t:"24%",e:"Not a valid result for this ratio.",k:false}]},

{d:"Computations & Closing",q:"A rectangular lot is 150 feet by 200 feet. Its area in square feet is:",
 work:["Area = 150 × 200","= <b>30,000 sq ft</b>"],ch:[
 {t:"30,000 sq ft",e:"150 × 200 = 30,000 sq ft — correct.",k:true},
 {t:"350 sq ft",e:"That adds the sides instead of multiplying.",k:false},
 {t:"3,000 sq ft",e:"Decimal slip — recheck 150 × 200.",k:false},
 {t:"60,000 sq ft",e:"That doubles the correct area.",k:false}]},

{d:"Computations & Closing",q:"A buyer purchases at $450,000 with a 75% loan, pays $6,000 in closing costs, and already put down $10,000 earnest money. The cash still needed at closing is:",
 work:["Down payment = $450,000 × 25% = <b>$112,500</b>","Add closing costs: $112,500 + $6,000 = <b>$118,500</b>","Subtract earnest money paid: $118,500 − $10,000 = <b>$108,500</b>"],ch:[
 {t:"$108,500",e:"$112,500 down + $6,000 costs − $10,000 earnest = $108,500 — correct.",k:true},
 {t:"$118,500",e:"That forgets to credit the $10,000 earnest money already paid.",k:false},
 {t:"$112,500",e:"That is only the down payment, ignoring costs and the deposit.",k:false},
 {t:"$128,500",e:"That adds the earnest money instead of subtracting it.",k:false}]},

{d:"Computations & Closing",q:"A parcel of land contains 174,240 square feet. How many acres is that? (1 acre = 43,560 sq ft)",
 work:["Acres = total sq ft ÷ 43,560","174,240 ÷ 43,560 = <b>4 acres</b>"],ch:[
 {t:"4 acres",e:"174,240 ÷ 43,560 = 4 acres — correct.",k:true},
 {t:"2 acres",e:"That would be only 87,120 sq ft.",k:false},
 {t:"8 acres",e:"That doubles the correct acreage.",k:false},
 {t:"40 acres",e:"Off by a factor of 10.",k:false}]},

/* ===== REAL ESTATE CONTRACTS (9) ===== */
{d:"Real Estate Contracts",q:"A valid written contract that can no longer be enforced because the statute of limitations has expired is:",ch:[
 {t:"Unenforceable",e:"It is valid in form but barred from enforcement — unenforceable, correct.",k:true},
 {t:"Void",e:"It was a real contract, not void from the start.",k:false},
 {t:"Voidable",e:"Voidable means a party may cancel; here time simply ran out.",k:false},
 {t:"Executed",e:"Executed means fully performed, which it was not.",k:false}]},

{d:"Real Estate Contracts",q:"The parol evidence rule generally prevents prior oral statements from:",ch:[
 {t:"Changing the terms of a complete written contract",e:"A full written contract controls over earlier oral talks — correct.",k:true},
 {t:"Being spoken at all",e:"It limits their legal effect, not whether they were said.",k:false},
 {t:"Replacing one of the buyers",e:"That is assignment/novation, not the parol rule.",k:false},
 {t:"Voiding the deed",e:"It concerns contract interpretation, not deeds.",k:false}]},

{d:"Real Estate Contracts",q:"An outstanding offer is terminated by:",ch:[
 {t:"The death of the offeror before acceptance",e:"Death of a party before acceptance terminates the offer — correct.",k:true},
 {t:"The agent taking a vacation",e:"That does not affect the offer.",k:false},
 {t:"Recording the listing",e:"Recording does not terminate an offer.",k:false},
 {t:"Holding an open house",e:"An open house has no effect on an existing offer.",k:false}]},

{d:"Real Estate Contracts",q:"A contract created by the parties' conduct rather than their words is a(n):",ch:[
 {t:"Implied contract",e:"An implied contract arises from actions/conduct — correct.",k:true},
 {t:"Express contract",e:"An express contract states its terms in words.",k:false},
 {t:"Void contract",e:"Conduct-based agreements are not automatically void.",k:false},
 {t:"Unilateral contract",e:"That describes how many parties promise, not implied vs express.",k:false}]},

{d:"Real Estate Contracts",q:"An inspection contingency in a sales contract lets the buyer:",ch:[
 {t:"Cancel (or renegotiate) if the inspection reveals problems",e:"It protects the buyer based on inspection results — correct.",k:true},
 {t:"Force the seller to make every repair",e:"It allows cancellation/negotiation, not mandatory repairs.",k:false},
 {t:"Waive the financing terms",e:"Inspection and financing are separate contingencies.",k:false},
 {t:"Extend the loan automatically",e:"It does not change loan terms.",k:false}]},

{d:"Real Estate Contracts",q:"A contract signed under duress or undue influence is:",ch:[
 {t:"Voidable by the victim",e:"Duress/undue influence lets the pressured party cancel — voidable, correct.",k:true},
 {t:"Automatically valid",e:"Coercion undermines genuine assent.",k:false},
 {t:"Void as illegal",e:"It is voidable, not void for illegality.",k:false},
 {t:"Already executed",e:"Coercion concerns formation, not completion.",k:false}]},

{d:"Real Estate Contracts",q:"A listing in which the broker keeps any amount received above the seller's set net price is a:",ch:[
 {t:"Net listing",e:"In a net listing the broker keeps the excess over the seller's net — correct.",k:true},
 {t:"Open listing",e:"An open listing pays a set commission to the procuring broker.",k:false},
 {t:"Exclusive agency",e:"That pays the broker unless the owner sells it.",k:false},
 {t:"Option listing",e:"That is not a standard listing type.",k:false}]},

{d:"Real Estate Contracts",q:"An option contract is ____ while a typical sales contract is ____:",ch:[
 {t:"unilateral; bilateral",e:"Only the optionor is bound (unilateral); a sales contract has promises on both sides (bilateral) — correct.",k:true},
 {t:"bilateral; unilateral",e:"Reversed — the option is the unilateral one.",k:false},
 {t:"void; valid",e:"Both can be valid; this isn't about validity.",k:false},
 {t:"implied; express",e:"Both are typically express, written agreements.",k:false}]},

{d:"Real Estate Contracts",q:"An assignment of a contract transfers:",ch:[
 {t:"The contract rights to a third party (assignee)",e:"Assignment passes the rights to another party — correct.",k:true},
 {t:"Full liability while releasing everyone",e:"That fuller release describes novation, not assignment.",k:false},
 {t:"Ownership of the brokerage",e:"It has nothing to do with brokerage ownership.",k:false},
 {t:"The property's zoning",e:"Zoning is unrelated to assignment.",k:false}]},

{d:"Taxes Affecting Real Estate",q:"A home is assessed at $355,000 with a $50,000 homestead exemption, taxed at 21 mills. The annual tax is:",
 work:["Taxable value = $355,000 − $50,000 = <b>$305,000</b>","21 mills = <b>$0.021</b> per $1","$305,000 × 0.021 = <b>$6,405</b>"],ch:[
 {t:"$6,405",e:"$305,000 taxable × 0.021 = $6,405 — correct.",k:true},
 {t:"$7,455",e:"That forgets to subtract the $50,000 exemption.",k:false},

 {t:"Ad valorem tax",e:"Ad valorem taxes fund general government based on value.",k:false},

 {t:"Eligible buyers in rural/suburban areas, often with no down payment",e:"USDA loans serve qualifying rural-area buyers with 100% financing — correct.",k:true},
 {t:"Veterans only",e:"That describes VA loans.",k:false},
 {t:"Investors only",e:"USDA loans are for owner-occupants, not investors.",k:false},

/* ===================== QUIZ ENGINE ===================== */
const LETTERS=["A","B","C","D"];
const PASS=75;
let order=[], cur=0, score=0, answered=0;
let results=[];

function shuffle(a){
  const arr=a.slice();
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}
function buildOrder(){
  order = shuffle(BANK.map((q,i)=>i)).map(i=>{
    const q=BANK[i];
    return {d:q.d, q:q.q, work:q.work||null, ch:shuffle(q.ch)};
  });
}

function render(){
  const total=order.length;
  const item=order[cur];
  document.getElementById("counter").textContent=`Question ${cur+1} of ${total}`;
  document.getElementById("liveScore").textContent=`Score: ${score}/${answered}`;
  document.getElementById("progressBar").style.width=((cur)/total*100)+"%";

  const choicesHtml=item.ch.map((c,idx)=>`
    <li class="choice" data-idx="${idx}" data-correct="${c.k}">
      <span class="letter">${LETTERS[idx]}</span>
      <span class="ctext">${c.t}</span>
      <span class="expl ${c.k?'good':'bad'}" id="expl-${idx}"></span>
    </li>`).join("");

  const workHtml = item.work ? `<div class="work"><div class="wt">📐 Worked solution</div><ol>${
      item.work.map(s=>`<li>${s}</li>`).join("")}</ol></div>` : "";

  document.getElementById("quiz").innerHTML=`
    <span class="domain">${item.d}</span>
    <p class="qtext">${item.q}</p>
    <ul class="choices" id="choices">${choicesHtml}</ul>
    <div class="verdict" id="verdict"></div>
    ${workHtml}
    <div class="nav">
      <button class="btn next" id="nextBtn">${cur+1<total?'Next Question →':'See My Results →'}</button>
    </div>`;

  item.ch.forEach((c,idx)=>{ document.getElementById("expl-"+idx).textContent=c.e; });

  document.querySelectorAll("#choices .choice").forEach(el=>{
    el.addEventListener("click",()=>onAnswer(el));
  });
  document.getElementById("nextBtn").addEventListener("click",next);
  window.scrollTo({top:0,behavior:"smooth"});
}

function onAnswer(el){
  const choices=document.getElementById("choices");
  if(choices.classList.contains("answered")) return;
  choices.classList.add("answered");
  const picked = el.dataset.correct==="true";
  answered++;
  if(picked) score++;
  results.push({domain:order[cur].d, correct:picked});

  document.querySelectorAll("#choices .choice").forEach(c=>{
    if(c.dataset.correct==="true") c.classList.add("correct");
    else c.classList.add("dim");
  });
  if(!picked){ el.classList.remove("dim"); el.classList.add("wrong"); }

  const v=document.getElementById("verdict");
  v.textContent = picked ? "✓ Correct" : "✗ Incorrect";
  v.classList.add(picked?"good":"bad");
  document.getElementById("liveScore").textContent=`Score: ${score}/${answered}`;
}

function next(){
  if(cur+1<order.length){ cur++; render(); }
  else showResults();
}

function showResults(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("progressBar").style.width="100%";
  document.getElementById("counter").textContent="Complete";
  const pct=Math.round(score/order.length*100);
  const pass=pct>=PASS;

  const dom={};
  results.forEach(r=>{
    dom[r.domain]=dom[r.domain]||{c:0,t:0};
    dom[r.domain].t++; if(r.correct) dom[r.domain].c++;
  });
  const rows=Object.keys(dom).sort((a,b)=> (dom[a].c/dom[a].t) - (dom[b].c/dom[b].t)).map(k=>{
    const p=Math.round(dom[k].c/dom[k].t*100);
    const cls=p<60?"lo":(p<75?"mid":"hi");
    const barcol=p<60?"#ea4335":(p<75?"#f4a000":"#34a853");
    return `<tr>
      <td>${k}<div class="barwrap"><div style="width:${p}%;background:${barcol}"></div></div></td>
      <td class="pct ${cls}">${dom[k].c}/${dom[k].t}<br>${p}%</td>
    </tr>`;
  }).join("");

  const r=document.getElementById("results");
  r.style.display="block";
  r.innerHTML=`
    <div class="result-card ${pass?'pass':'fail'}">
      <div class="result-badge">${pass?'On Track':'Keep Drilling'}</div>
      <div class="result-score">${pct}%</div>
      <div>${score} of ${order.length} correct on your weak areas</div>
      <div class="result-sub">${pass
        ? "At or above 75% on the toughest topics — exactly where you need to be. Run it again to lock it in."
        : `The real exam needs 75%. On these weak areas you're at ${pct}% — keep drilling the red rows below until they turn green.`}</div>
    </div>
    <h3 class="bd">Your score by topic (weakest first)</h3>
    <table class="dom">${rows}</table>
    <div class="nav" style="margin-top:22px;">
      <button class="btn secondary" onclick="location.reload()">↻ Retake (reshuffles)</button>
    </div>
    <p class="footnote">Weak-areas drill, Set B (50 Q). Math questions show a step-by-step worked solution.
    Questions reshuffle each attempt.
    <br><a href="index.html" style="color:#088395;font-weight:700;">Drill A</a> &nbsp;·&nbsp;
    <a href="full.html" style="color:#088395;font-weight:700;">Full 100-Q mock exam</a><br>
    Study tool only — not affiliated with DBPR or Pearson VUE; verify current statutes and figures before relying on them.</p>`;
  document.getElementById("liveScore").textContent=`Score: ${score}/${order.length}`;
  window.scrollTo({top:0,behavior:"smooth"});
}

buildOrder();
render();
</script>
