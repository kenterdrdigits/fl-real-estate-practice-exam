<style>
  :root{
    --navy:#0a4d68; --teal:#088395; --sky:#05bfdb; --bg:#f3f6f8;
    --green:#1e8e3e; --green-bg:#e6f4ea; --green-bd:#34a853;
    --red:#c5221f; --red-bg:#fce8e6; --red-bd:#ea4335;
    --ink:#1f2d33; --muted:#5f7178; --card:#ffffff; --line:#dde6ea;
    --amber:#946200; --amber-bg:#fff6e0; --amber-bd:#f0c14b;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.45;
    padding:0 0 40px; -webkit-font-smoothing:antialiased;
  }
  header{
    background:linear-gradient(135deg,var(--navy),var(--teal));
    color:#fff; padding:16px 18px 14px; position:sticky; top:0; z-index:10;
    box-shadow:0 2px 10px rgba(0,0,0,.12);
  }
  header h1{font-size:15px; margin:0 0 10px; font-weight:700; letter-spacing:.2px;}
  .meta{display:flex; justify-content:space-between; align-items:center; font-size:13px; font-weight:600;}
  .meta .score{background:rgba(255,255,255,.18); padding:3px 10px; border-radius:20px;}
  .progress{height:7px; background:rgba(255,255,255,.25); border-radius:6px; margin-top:10px; overflow:hidden;}
  .progress > div{height:100%; width:0; background:var(--sky); border-radius:6px; transition:width .3s ease;}
  .switch{text-align:center;padding:9px 12px;background:#e3f2f5;font-size:13px;}
  .switch a{color:var(--navy);font-weight:700;text-decoration:none;}
  main{max-width:680px; margin:0 auto; padding:18px 16px 0;}
  .domain{display:inline-block; font-size:11px; font-weight:700; text-transform:uppercase;
    letter-spacing:.5px; color:var(--teal); background:#e3f2f5; padding:4px 9px; border-radius:6px; margin-bottom:12px;}
  .qtext{font-size:18px; font-weight:600; margin:0 0 18px; line-height:1.4;}
  .choices{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:11px;}
  .choice{
    display:flex; align-items:flex-start; gap:11px; background:var(--card);
    border:2px solid var(--line); border-radius:13px; padding:14px 15px; cursor:pointer;
    font-size:16px; transition:border-color .15s, background .15s; user-select:none;
  }
  .choice:active{transform:scale(.995);}
  .choice .letter{
    flex:0 0 26px; height:26px; border-radius:50%; background:#eef3f5; color:var(--navy);
    font-weight:700; font-size:14px; display:flex; align-items:center; justify-content:center; margin-top:1px;
  }
  .choice .ctext{flex:1;}
  .choice.correct{border-color:var(--green-bd); background:var(--green-bg);}
  .choice.correct .letter{background:var(--green-bd); color:#fff;}
  .choice.wrong{border-color:var(--red-bd); background:var(--red-bg);}
  .choice.wrong .letter{background:var(--red-bd); color:#fff;}
  .choice.dim{opacity:.85;}
  .answered .choice{cursor:default;}
  .expl{font-size:13.5px; margin-top:9px; padding-left:37px; display:none; line-height:1.4;}
  .answered .expl{display:block;}
  .expl.good{color:var(--green);}
  .expl.bad{color:var(--red);}
  .verdict{margin:18px 0 4px; font-weight:700; font-size:16px; display:none;}
  .answered .verdict{display:block;}
  .verdict.good{color:var(--green);} .verdict.bad{color:var(--red);}
  /* worked math box */
  .work{display:none; margin:14px 0 2px; background:var(--amber-bg); border:1.5px solid var(--amber-bd);
    border-radius:12px; padding:13px 15px;}
  .answered .work{display:block;}
  .work .wt{font-weight:800; font-size:13px; color:var(--amber); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px;}
  .work ol{margin:0; padding-left:20px;}
  .work li{font-size:14.5px; margin:5px 0; line-height:1.5; font-variant-numeric:tabular-nums;}
  .work li b{color:var(--ink);}
  .nav{margin:22px 0 8px; display:flex; gap:12px;}
  button.btn{
    flex:1; border:none; border-radius:12px; padding:15px; font-size:16px; font-weight:700;
    background:var(--navy); color:#fff; cursor:pointer; transition:opacity .15s, background .15s;
  }
  button.btn.secondary{background:#e0e8ec; color:var(--navy);}
  button.btn.next{display:none;}
  .answered ~ .nav button.btn.next{display:block;}
  #results{display:none;}
  .result-card{background:var(--card); border-radius:16px; padding:24px 20px; text-align:center; box-shadow:0 2px 10px rgba(0,0,0,.06);}
  .result-score{font-size:54px; font-weight:800; margin:6px 0;}
  .result-card.pass .result-score{color:var(--green);}
  .result-card.fail .result-score{color:var(--red);}
  .result-badge{display:inline-block; font-size:15px; font-weight:800; padding:7px 18px; border-radius:30px; text-transform:uppercase; letter-spacing:1px;}
  .result-card.pass .result-badge{background:var(--green-bg); color:var(--green);}
  .result-card.fail .result-badge{background:var(--red-bg); color:var(--red);}
  .result-sub{color:var(--muted); font-size:14px; margin-top:10px;}
  h3.bd{font-size:15px; margin:26px 0 10px; color:var(--navy);}
  table.dom{width:100%; border-collapse:collapse; font-size:13.5px; background:var(--card); border-radius:12px; overflow:hidden;}
  table.dom td{padding:10px 12px; border-bottom:1px solid var(--line); vertical-align:middle;}
  table.dom tr:last-child td{border-bottom:none;}
  table.dom td.pct{text-align:right; font-weight:700; white-space:nowrap;}
  .pct.lo{color:var(--red);} .pct.mid{color:#c77800;} .pct.hi{color:var(--green);}
  .barwrap{background:#eef3f5; height:6px; border-radius:4px; margin-top:5px; overflow:hidden;}
  .barwrap>div{height:100%; border-radius:4px;}
  .footnote{font-size:12px; color:var(--muted); text-align:center; margin:24px 8px 0; line-height:1.5;}
</style>

<script>
/* =========================================================================
   FOCUSED WEAK-AREAS DRILL (50 Q) — built from the 4th score report.
   Heavy on: Computations/Closing, Contracts, Taxes, Mortgage Types,
   Brokerage, Residential Mortgages. Math questions include a step-by-step
   worked re-computation (the `work` array) shown after answering.
   Choice: t=text, e=why right/wrong, k=correct.  Optional work=[steps].
   ========================================================================= */
const BANK = [

/* ===== COMPUTATIONS & CLOSING (12) ===== */
{d:"Computations & Closing",q:"A property sells for $327,650. Deed doc stamps are $0.70 per $100, and any fraction of $100 rounds UP. The deed doc-stamp tax is:",
 work:["Round price UP to the next $100: $327,650 → <b>$327,700</b>","$327,700 ÷ $100 = <b>3,277</b> units","3,277 × $0.70 = <b>$2,293.90</b>"],ch:[
 {t:"$2,293.90",e:"After rounding up to $327,700, 3,277 × $0.70 = $2,293.90 — correct.",k:true},
 {t:"$2,293.55",e:"This skipped rounding the fraction up to the next $100.",k:false},
 {t:"$1,146.95",e:"That uses the $0.35 note rate, not the $0.70 deed rate.",k:false},
 {t:"$3,277.00",e:"That is just the unit count, not the tax.",k:false}]},

{d:"Computations & Closing",q:"A buyer signs a new $342,000 promissory note. Note doc stamps are $0.35 per $100. The note doc-stamp tax is:",
 work:["$342,000 ÷ $100 = <b>3,420</b> units","3,420 × $0.35 = <b>$1,197.00</b>"],ch:[
 {t:"$1,197.00",e:"3,420 × $0.35 = $1,197 — correct.",k:true},
 {t:"$2,394.00",e:"That uses the $0.70 DEED rate, not the note rate.",k:false},
 {t:"$684.00",e:"That is the intangible tax ($0.002), a separate charge.",k:false},
 {t:"$119.70",e:"Decimal slip — the rate is $0.35, not $0.035, per $100.",k:false}]},

{d:"Computations & Closing",q:"A new mortgage is $295,000. The Florida intangible tax is 2 mills ($0.002 per $1). The intangible tax is:",
 work:["Rate = 2 mills = <b>$0.002</b> per $1","$295,000 × 0.002 = <b>$590.00</b>"],ch:[
 {t:"$590.00",e:"$295,000 × 0.002 = $590 — correct.",k:true},
 {t:"$1,032.50",e:"That uses the $0.35/$100 note rate, not the intangible rate.",k:false},
 {t:"$295.00",e:"That is only 1 mill; the rate is 2 mills.",k:false},
 {t:"$5,900.00",e:"Decimal slip — 2 mills is $0.002, not $0.02.",k:false}]},

{d:"Computations & Closing",q:"Annual property taxes are $5,110, unpaid (arrears), 365-day method. The seller owns the property 146 days of the tax year. The proration entry is:",
 work:["Daily rate = $5,110 ÷ 365 = <b>$14.00/day</b>","Seller's 146 days: 146 × $14 = <b>$2,044</b>","Arrears (not yet paid) → <b>DEBIT seller, CREDIT buyer</b>"],ch:[
 {t:"$2,044 debit to the seller",e:"$14/day × 146 = $2,044; in arrears the seller owes it, so debit seller / credit buyer — correct.",k:true},
 {t:"$2,044 credit to the seller",e:"Amount is right but reversed — in arrears it is a debit to the seller.",k:false},
 {t:"$3,066 debit to the seller",e:"That uses 219 days; the seller owns 146 days here.",k:false},
 {t:"$14 debit to the seller",e:"$14 is only the daily rate, not the 146-day total.",k:false}]},

{d:"Computations & Closing",q:"Sale price $625,000, commission 6%, split 50/50 between the brokers. The listing broker pays its associate 65% of its half. The associate receives:",
 work:["Total commission: $625,000 × 0.06 = <b>$37,500</b>","Listing side's half: $37,500 ÷ 2 = <b>$18,750</b>","Associate's 65%: $18,750 × 0.65 = <b>$12,187.50</b>"],ch:[
 {t:"$12,187.50",e:"65% of the $18,750 half = $12,187.50 — correct.",k:true},
 {t:"$18,750.00",e:"That is the full half, before the associate's 65% split.",k:false},
 {t:"$6,562.50",e:"That is the broker's retained 35%, not the associate's share.",k:false},
 {t:"$24,375.00",e:"That takes 65% of the entire commission, not one half.",k:false}]},

{d:"Computations & Closing",q:"A seller sells for $400,000, pays a 6% commission and $3,200 in other costs, and pays off a $180,000 mortgage. The seller's NET cash proceeds are:",
 work:["Commission = $400,000 × 0.06 = <b>$24,000</b>","Net = $400,000 − $24,000 − $3,200 − $180,000","= <b>$192,800</b>"],ch:[
 {t:"$192,800",e:"$400,000 − $24,000 − $3,200 − $180,000 = $192,800 — correct.",k:true},
 {t:"$372,800",e:"That forgets to pay off the $180,000 mortgage.",k:false},
 {t:"$196,000",e:"That omits the $3,200 in other costs.",k:false},
 {t:"$216,800",e:"That leaves out the commission.",k:false}]},

{d:"Computations & Closing",q:"A $360,000 loan carries 5% annual interest. Using a 360-day year, the borrower owes prepaid interest for 11 days at closing. The amount is:",
 work:["Annual interest = $360,000 × 0.05 = <b>$18,000</b>","Daily (360-day) = $18,000 ÷ 360 = <b>$50/day</b>","11 days × $50 = <b>$550</b>"],ch:[
 {t:"$550",e:"$50/day × 11 days = $550 — correct.",k:true},
 {t:"$50",e:"That is only one day of interest.",k:false},
 {t:"$600",e:"That uses 12 days; the problem says 11.",k:false},
 {t:"$1,500",e:"That is a full month of interest, not 11 days.",k:false}]},

{d:"Computations & Closing",q:"A buyer purchases a $425,000 home with a 90% loan-to-value loan. The down payment is:",
 work:["Loan = $425,000 × 0.90 = <b>$382,500</b>","Down payment = $425,000 − $382,500 = <b>$42,500</b>"],ch:[
 {t:"$42,500",e:"$425,000 − $382,500 loan = $42,500 down — correct.",k:true},
 {t:"$382,500",e:"That is the loan amount, not the down payment.",k:false},
 {t:"$85,000",e:"That uses a 20% down assumption, not 10%.",k:false},
 {t:"$4,250",e:"That is only 1% of the price.",k:false}]},

{d:"Computations & Closing",q:"A home listed at $350,000 sells for $329,000. It sold for what percent of the list price?",
 work:["% of list = sale price ÷ list price","$329,000 ÷ $350,000 = 0.94 = <b>94%</b>"],ch:[
 {t:"94%",e:"$329,000 ÷ $350,000 = 94% — correct.",k:true},
 {t:"106%",e:"That divides list by sale; it sold BELOW list.",k:false},
 {t:"6%",e:"6% is the discount off list, not the percent of list.",k:false},
 {t:"21%",e:"Not a valid result for this ratio.",k:false}]},

{d:"Computations & Closing",q:"A rectangular lot is 120 feet wide and 90 feet deep. Its area in square feet is:",
 work:["Area = width × depth","120 × 90 = <b>10,800 sq ft</b>"],ch:[
 {t:"10,800 sq ft",e:"120 × 90 = 10,800 sq ft — correct.",k:true},
 {t:"210 sq ft",e:"That adds the sides instead of multiplying.",k:false},
 {t:"1,080 sq ft",e:"Decimal slip — recheck 120 × 90.",k:false},
 {t:"21,600 sq ft",e:"That doubles the correct area.",k:false}]},

{d:"Computations & Closing",q:"A lot with 80 front feet sells for $120,000. The price per front foot is:",
 work:["Price per front foot = price ÷ front feet","$120,000 ÷ 80 = <b>$1,500</b>"],ch:[
 {t:"$1,500",e:"$120,000 ÷ 80 = $1,500 per front foot — correct.",k:true},
 {t:"$150",e:"Off by a factor of 10.",k:false},
 {t:"$1,200",e:"Not the correct quotient.",k:false},
 {t:"$9,600,000",e:"That multiplies instead of dividing.",k:false}]},

{d:"Computations & Closing",q:"A property bought for $200,000 is now worth $260,000. The appreciation as a percent of the original cost is:",
 work:["Gain = $260,000 − $200,000 = <b>$60,000</b>","% = gain ÷ ORIGINAL cost = $60,000 ÷ $200,000","= 0.30 = <b>30%</b>"],ch:[
 {t:"30%",e:"$60,000 ÷ $200,000 (original cost) = 30% — correct.",k:true},
 {t:"23%",e:"That divides by the new value; appreciation uses the original cost.",k:false},
 {t:"60%",e:"That confuses the dollar gain with a percentage.",k:false},
 {t:"130%",e:"That is the new value as a % of cost, not the gain.",k:false}]},

/* ===== REAL ESTATE CONTRACTS (9) ===== */
{d:"Real Estate Contracts",q:"Which of the following IS required for a valid contract?",ch:[
 {t:"Competent parties",e:"Legal capacity of the parties is an essential element — correct.",k:true},
 {t:"An earnest money deposit",e:"Earnest money is customary but not required for validity.",k:false},
 {t:"A real estate license",e:"A license is not a contract element.",k:false},
 {t:"Recording in the public records",e:"Recording is not required for a contract to be valid.",k:false}]},

{d:"Real Estate Contracts",q:"A contract that the defrauded party may cancel is:",ch:[
 {t:"Voidable",e:"Fraud makes a contract voidable at the innocent party's option — correct.",k:true},
 {t:"Void",e:"Void means no contract ever existed; a defrauded party may instead choose to enforce it.",k:false},
 {t:"Executed",e:"That refers to completion, not the fraud issue.",k:false},
 {t:"Valid and unbreakable",e:"Fraud gives the victim a right to cancel.",k:false}]},

{d:"Real Estate Contracts",q:"A clearly stated, written agreement is a(n):",ch:[
 {t:"Express contract",e:"An express contract states its terms in words — correct.",k:true},
 {t:"Implied contract",e:"An implied contract arises from conduct, not stated words.",k:false},
 {t:"Unilateral contract",e:"That describes how many parties promise, not whether terms are stated.",k:false},
 {t:"Void contract",e:"A clear written agreement is not automatically void.",k:false}]},

{d:"Real Estate Contracts",q:"Canceling a contract and returning both parties to their original positions is:",ch:[
 {t:"Rescission",e:"Rescission undoes the contract and restores the parties — correct.",k:true},
 {t:"Novation",e:"Novation substitutes a new contract or party.",k:false},
 {t:"Reformation",e:"Reformation corrects a written error in a contract.",k:false},
 {t:"Assignment",e:"Assignment transfers rights to another party.",k:false}]},

{d:"Real Estate Contracts",q:"Correcting a written contract to fix a clerical (scrivener's) error is:",ch:[
 {t:"Reformation",e:"Reformation amends the writing to reflect the true agreement — correct.",k:true},
 {t:"Rescission",e:"Rescission cancels the contract rather than correcting it.",k:false},
 {t:"Novation",e:"Novation replaces the contract or a party.",k:false},
 {t:"Revocation",e:"Revocation withdraws an offer before acceptance.",k:false}]},

{d:"Real Estate Contracts",q:"After signing a sales contract but before closing, the buyer holds:",ch:[
 {t:"Equitable title",e:"A buyer under contract holds equitable title until closing — correct.",k:true},
 {t:"Legal title",e:"Legal title passes at closing via the deed.",k:false},
 {t:"No interest at all",e:"The buyer has an equitable interest once under contract.",k:false},
 {t:"A leasehold",e:"A purchase contract is not a lease.",k:false}]},

{d:"Real Estate Contracts",q:"In an installment land contract (contract for deed), legal title remains with the:",ch:[
 {t:"Seller until the price is fully paid",e:"The seller keeps legal title until the buyer pays in full — correct.",k:true},
 {t:"Buyer immediately at signing",e:"The buyer gets only equitable title until paid.",k:false},
 {t:"Lender",e:"There may be no third-party lender in a land contract.",k:false},
 {t:"County recorder",e:"The recorder does not hold title.",k:false}]},

{d:"Real Estate Contracts",q:"A listing in which the seller may hire several brokers and pays only the one who actually sells is a(n):",ch:[
 {t:"Open listing",e:"An open listing pays only the procuring broker and allows multiple brokers — correct.",k:true},
 {t:"Exclusive right of sale",e:"That pays the listing broker no matter who sells.",k:false},
 {t:"Exclusive agency",e:"That uses one broker, with the owner able to sell themselves.",k:false},
 {t:"Net listing",e:"That concerns how the commission is figured, not multiple brokers.",k:false}]},

{d:"Real Estate Contracts",q:"A 'meeting of the minds,' where an offer is accepted on identical terms, is called:",ch:[
 {t:"Mutual assent",e:"Mutual assent (offer + matching acceptance) forms the agreement — correct.",k:true},
 {t:"Consideration",e:"Consideration is the value exchanged, not the agreement itself.",k:false},
 {t:"Novation",e:"Novation substitutes a party or contract.",k:false},
 {t:"A contingency",e:"A contingency is a condition, not the agreement.",k:false}]},

/* ===== TAXES AFFECTING REAL ESTATE (6) ===== */
{d:"Taxes Affecting Real Estate",q:"A home is assessed at $410,000 with a $50,000 homestead exemption, taxed at 19 mills. The annual tax is:",
 work:["Taxable value = $410,000 − $50,000 = <b>$360,000</b>","19 mills = <b>$0.019</b> per $1","$360,000 × 0.019 = <b>$6,840</b>"],ch:[
 {t:"$6,840",e:"$360,000 taxable × 0.019 = $6,840 — correct.",k:true},
 {t:"$7,790",e:"That forgets to subtract the $50,000 exemption.",k:false},
 {t:"$684",e:"That uses 1.9 mills instead of 19.",k:false},
 {t:"$3,600",e:"That uses 10 mills, not 19.",k:false}]},

{d:"Taxes Affecting Real Estate",q:"The FIRST $25,000 of Florida's homestead exemption applies to:",ch:[
 {t:"All property taxes, including school taxes",e:"The first $25,000 applies to all taxes; only the second $25,000 excludes school taxes — correct.",k:true},
 {t:"Only non-school taxes",e:"That describes the SECOND $25,000 tier.",k:false},
 {t:"Only county taxes",e:"The first tier is broader than just county taxes.",k:false},
 {t:"No taxes at all",e:"It does reduce taxes — that's its purpose.",k:false}]},

{d:"Taxes Affecting Real Estate",q:"The 'Save Our Homes' cap limits annual increases in a homestead's assessed value to:",ch:[
 {t:"3% or the change in CPI, whichever is lower",e:"Save Our Homes caps homestead assessment growth at 3% or CPI, whichever is less — correct.",k:true},
 {t:"10% per year",e:"10% is the cap for certain NON-homestead property.",k:false},
 {t:"5% per year",e:"The homestead cap is 3%, not 5%.",k:false},
 {t:"There is no cap",e:"Homestead property is capped.",k:false}]},

{d:"Taxes Affecting Real Estate",q:"In Florida, the assessed value of property for tax purposes is set by the:",ch:[
 {t:"County property appraiser",e:"The county property appraiser determines assessed (just) value — correct.",k:true},
 {t:"Tax collector",e:"The tax collector collects taxes but does not set value.",k:false},
 {t:"FREC",e:"FREC regulates licensees, not assessments.",k:false},
 {t:"The seller",e:"The owner does not set the assessed value.",k:false}]},

{d:"Taxes Affecting Real Estate",q:"A homeowner with no exemptions pays $4,500 in taxes at a rate of 15 mills. The assessed value is:",
 work:["15 mills = <b>$0.015</b> per $1","Value = tax ÷ rate = $4,500 ÷ 0.015","= <b>$300,000</b>"],ch:[
 {t:"$300,000",e:"$4,500 ÷ 0.015 = $300,000 — correct.",k:true},
 {t:"$67,500",e:"That multiplies instead of dividing.",k:false},
 {t:"$30,000",e:"Off by a factor of 10.",k:false},
 {t:"$675,000",e:"Not a valid result for this rate.",k:false}]},

{d:"Taxes Affecting Real Estate",q:"Florida's $5,000 property tax exemption is available to a qualifying:",ch:[
 {t:"Widow, widower, blind, or totally/permanently disabled person",e:"These groups qualify for the $5,000 exemption — correct.",k:true},
 {t:"First-time homebuyer",e:"There is no general first-time-buyer property-tax exemption.",k:false},
 {t:"Real estate licensee",e:"Holding a license does not create a tax exemption.",k:false},
 {t:"Out-of-state owner",e:"Non-residents do not get this exemption.",k:false}]},

/* ===== TYPES OF MORTGAGES & SOURCES OF FINANCING (6) ===== */
{d:"Mortgage Types & Financing",q:"A buyer earns $7,000 gross per month. Using a 36% total-debt (back-end) ratio, the maximum total monthly debt payments are:",
 work:["Back-end ratio = <b>36%</b> of gross monthly income","$7,000 × 0.36 = <b>$2,520</b>"],ch:[
 {t:"$2,520",e:"$7,000 × 0.36 = $2,520 — correct.",k:true},
 {t:"$1,960",e:"That is the 28% housing (front-end) ratio.",k:false},
 {t:"$700",e:"That is only 10% of income.",k:false},
 {t:"$2,800",e:"That uses 40%, not 36%.",k:false}]},

{d:"Mortgage Types & Financing",q:"Ginnie Mae (GNMA) primarily:",ch:[
 {t:"Guarantees securities backed by pools of FHA and VA loans",e:"Ginnie Mae backs MBS made up of government loans — correct.",k:true},
 {t:"Insures conventional loans",e:"Ginnie Mae does not insure conventional loans.",k:false},
 {t:"Sets the prime interest rate",e:"Rate setting is the Federal Reserve's role.",k:false},
 {t:"Lends directly to home buyers",e:"It does not originate loans to buyers.",k:false}]},

/* ===================== QUIZ ENGINE ===================== */
const LETTERS=["A","B","C","D"];
const PASS=75;
let order=[], cur=0, score=0, answered=0;
let results=[];

function shuffle(a){
  const arr=a.slice();
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}
function buildOrder(){
  order = shuffle(BANK.map((q,i)=>i)).map(i=>{
    const q=BANK[i];
    return {d:q.d, q:q.q, work:q.work||null, ch:shuffle(q.ch)};
  });
}

function render(){
  const total=order.length;
  const item=order[cur];
  document.getElementById("counter").textContent=`Question ${cur+1} of ${total}`;
  document.getElementById("liveScore").textContent=`Score: ${score}/${answered}`;
  document.getElementById("progressBar").style.width=((cur)/total*100)+"%";

  const choicesHtml=item.ch.map((c,idx)=>`
    <li class="choice" data-idx="${idx}" data-correct="${c.k}">
      <span class="letter">${LETTERS[idx]}</span>
      <span class="ctext">${c.t}</span>
      <span class="expl ${c.k?'good':'bad'}" id="expl-${idx}"></span>
    </li>`).join("");

  const workHtml = item.work ? `<div class="work"><div class="wt">📐 Worked solution</div><ol>${
      item.work.map(s=>`<li>${s}</li>`).join("")}</ol></div>` : "";

  document.getElementById("quiz").innerHTML=`
    <span class="domain">${item.d}</span>
    <p class="qtext">${item.q}</p>
    <ul class="choices" id="choices">${choicesHtml}</ul>
    <div class="verdict" id="verdict"></div>
    ${workHtml}
    <div class="nav">
      <button class="btn next" id="nextBtn">${cur+1<total?'Next Question →':'See My Results →'}</button>
    </div>`;

  item.ch.forEach((c,idx)=>{ document.getElementById("expl-"+idx).textContent=c.e; });

  document.querySelectorAll("#choices .choice").forEach(el=>{
    el.addEventListener("click",()=>onAnswer(el));
  });
  document.getElementById("nextBtn").addEventListener("click",next);
  window.scrollTo({top:0,behavior:"smooth"});
}

function onAnswer(el){
  const choices=document.getElementById("choices");
  if(choices.classList.contains("answered")) return;
  choices.classList.add("answered");
  const picked = el.dataset.correct==="true";
  answered++;
  if(picked) score++;
  results.push({domain:order[cur].d, correct:picked});

  document.querySelectorAll("#choices .choice").forEach(c=>{
    if(c.dataset.correct==="true") c.classList.add("correct");
    else c.classList.add("dim");
  });
  if(!picked){ el.classList.remove("dim"); el.classList.add("wrong"); }

  const v=document.getElementById("verdict");
  v.textContent = picked ? "✓ Correct" : "✗ Incorrect";
  v.classList.add(picked?"good":"bad");
  document.getElementById("liveScore").textContent=`Score: ${score}/${answered}`;
}

function next(){
  if(cur+1<order.length){ cur++; render(); }
  else showResults();
}

function showResults(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("progressBar").style.width="100%";
  document.getElementById("counter").textContent="Complete";
  const pct=Math.round(score/order.length*100);
  const pass=pct>=PASS;

  const dom={};
  results.forEach(r=>{
    dom[r.domain]=dom[r.domain]||{c:0,t:0};
    dom[r.domain].t++; if(r.correct) dom[r.domain].c++;
  });
  const rows=Object.keys(dom).sort((a,b)=> (dom[a].c/dom[a].t) - (dom[b].c/dom[b].t)).map(k=>{
    const p=Math.round(dom[k].c/dom[k].t*100);
    const cls=p<60?"lo":(p<75?"mid":"hi");
    const barcol=p<60?"#ea4335":(p<75?"#f4a000":"#34a853");
    return `<tr>
      <td>${k}<div class="barwrap"><div style="width:${p}%;background:${barcol}"></div></div></td>
      <td class="pct ${cls}">${dom[k].c}/${dom[k].t}<br>${p}%</td>
    </tr>`;
  }).join("");

  const r=document.getElementById("results");
  r.style.display="block";
  r.innerHTML=`
    <div class="result-card ${pass?'pass':'fail'}">
      <div class="result-badge">${pass?'On Track':'Keep Drilling'}</div>
      <div class="result-score">${pct}%</div>
      <div>${score} of ${order.length} correct on your weak areas</div>
      <div class="result-sub">${pass
        ? "At or above 75% on the toughest topics — that's exactly where you need to be. Run it again to lock it in."
        : `The real exam needs 75%. On these weak areas you're at ${pct}% — keep drilling the red rows below until they turn green.`}</div>
    </div>
    <h3 class="bd">Your score by topic (weakest first)</h3>
    <table class="dom">${rows}</table>
    <div class="nav" style="margin-top:22px;">
      <button class="btn secondary" onclick="location.reload()">↻ Retake (reshuffles)</button>
    </div>
    <p class="footnote">Focused weak-areas drill (50 Q), built from the latest score report. Math questions show a
    step-by-step worked solution. Questions reshuffle each attempt.
    <br><a href="drill2.html" style="color:#088395;font-weight:700;">Drill B (50 more)</a> &nbsp;·&nbsp;
    <a href="full.html" style="color:#088395;font-weight:700;">Full 100-question mock exam</a><br>
    Study tool only — not affiliated with DBPR or Pearson VUE; verify current statutes and figures before relying on them.</p>`;
  document.getElementById("liveScore").textContent=`Score: ${score}/${order.length}`;
  window.scrollTo({top:0,behavior:"smooth"});
}

buildOrder();
render();
</script>
