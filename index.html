<!DOCTYPE html>

<style>
  :root{
    --navy:#0a4d68; --teal:#088395; --sky:#05bfdb; --bg:#f3f6f8;
    --green:#1e8e3e; --green-bg:#e6f4ea; --green-bd:#34a853;
    --red:#c5221f; --red-bg:#fce8e6; --red-bd:#ea4335;
    --ink:#1f2d33; --muted:#5f7178; --card:#ffffff; --line:#dde6ea;
    --amber:#946200; --amber-bg:#fff6e0; --amber-bd:#f0c14b;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.45;
    padding:0 0 40px; -webkit-font-smoothing:antialiased;
  }
  header{
    background:linear-gradient(135deg,var(--navy),var(--teal));
    color:#fff; padding:16px 18px 14px; position:sticky; top:0; z-index:10;
    box-shadow:0 2px 10px rgba(0,0,0,.12);
  }
  header h1{font-size:15px; margin:0 0 10px; font-weight:700; letter-spacing:.2px;}
  .meta{display:flex; justify-content:space-between; align-items:center; font-size:13px; font-weight:600;}
  .meta .score{background:rgba(255,255,255,.18); padding:3px 10px; border-radius:20px;}
  .progress{height:7px; background:rgba(255,255,255,.25); border-radius:6px; margin-top:10px; overflow:hidden;}
  .progress > div{height:100%; width:0; background:var(--sky); border-radius:6px; transition:width .3s ease;}
  .switch{text-align:center;padding:9px 12px;background:#e3f2f5;font-size:13px;}
  .switch a{color:var(--navy);font-weight:700;text-decoration:none;}
  main{max-width:680px; margin:0 auto; padding:18px 16px 0;}
  .domain{display:inline-block; font-size:11px; font-weight:700; text-transform:uppercase;
    letter-spacing:.5px; color:var(--teal); background:#e3f2f5; padding:4px 9px; border-radius:6px; margin-bottom:12px;}
  .qtext{font-size:18px; font-weight:600; margin:0 0 18px; line-height:1.4;}
  .choices{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:11px;}
  .choice{
    display:flex; align-items:flex-start; gap:11px; background:var(--card);
    border:2px solid var(--line); border-radius:13px; padding:14px 15px; cursor:pointer;
    font-size:16px; transition:border-color .15s, background .15s; user-select:none;
  }
  .choice:active{transform:scale(.995);}
  .choice .letter{
    flex:0 0 26px; height:26px; border-radius:50%; background:#eef3f5; color:var(--navy);
    font-weight:700; font-size:14px; display:flex; align-items:center; justify-content:center; margin-top:1px;
  }
  .choice .ctext{flex:1;}
  .choice.correct{border-color:var(--green-bd); background:var(--green-bg);}
  .choice.correct .letter{background:var(--green-bd); color:#fff;}
  .choice.wrong{border-color:var(--red-bd); background:var(--red-bg);}
  .choice.wrong .letter{background:var(--red-bd); color:#fff;}
  .choice.dim{opacity:.85;}
  .answered .choice{cursor:default;}
  .expl{font-size:13.5px; margin-top:9px; padding-left:37px; display:none; line-height:1.4;}
  .answered .expl{display:block;}
  .expl.good{color:var(--green);}
  .expl.bad{color:var(--red);}
  .verdict{margin:18px 0 4px; font-weight:700; font-size:16px; display:none;}
  .answered .verdict{display:block;}
  .verdict.good{color:var(--green);} .verdict.bad{color:var(--red);}
  /* worked math box */
  .work{display:none; margin:14px 0 2px; background:var(--amber-bg); border:1.5px solid var(--amber-bd);
    border-radius:12px; padding:13px 15px;}
  .answered .work{display:block;}
  .work .wt{font-weight:800; font-size:13px; color:var(--amber); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px;}
  .work ol{margin:0; padding-left:20px;}
  .work li{font-size:14.5px; margin:5px 0; line-height:1.5; font-variant-numeric:tabular-nums;}
  .work li b{color:var(--ink);}
  .nav{margin:22px 0 8px; display:flex; gap:12px;}
  button.btn{
    flex:1; border:none; border-radius:12px; padding:15px; font-size:16px; font-weight:700;
    background:var(--navy); color:#fff; cursor:pointer; transition:opacity .15s, background .15s;
  }
  button.btn.secondary{background:#e0e8ec; color:var(--navy);}
  button.btn.next{display:none;}
  .answered ~ .nav button.btn.next{display:block;}
  #results{display:none;}
  .result-card{background:var(--card); border-radius:16px; padding:24px 20px; text-align:center; box-shadow:0 2px 10px rgba(0,0,0,.06);}
  .result-score{font-size:54px; font-weight:800; margin:6px 0;}
  .result-card.pass .result-score{color:var(--green);}
  .result-card.fail .result-score{color:var(--red);}
  .result-badge{display:inline-block; font-size:15px; font-weight:800; padding:7px 18px; border-radius:30px; text-transform:uppercase; letter-spacing:1px;}
  .result-card.pass .result-badge{background:var(--green-bg); color:var(--green);}
  .result-card.fail .result-badge{background:var(--red-bg); color:var(--red);}
  .result-sub{color:var(--muted); font-size:14px; margin-top:10px;}
  h3.bd{font-size:15px; margin:26px 0 10px; color:var(--navy);}
  table.dom{width:100%; border-collapse:collapse; font-size:13.5px; background:var(--card); border-radius:12px; overflow:hidden;}
  table.dom td{padding:10px 12px; border-bottom:1px solid var(--line); vertical-align:middle;}
  table.dom tr:last-child td{border-bottom:none;}
  table.dom td.pct{text-align:right; font-weight:700; white-space:nowrap;}
  .pct.lo{color:var(--red);} .pct.mid{color:#c77800;} .pct.hi{color:var(--green);}
  .barwrap{background:#eef3f5; height:6px; border-radius:4px; margin-top:5px; overflow:hidden;}
  .barwrap>div{height:100%; border-radius:4px;}
  .footnote{font-size:12px; color:var(--muted); text-align:center; margin:24px 8px 0; line-height:1.5;}
</style>

<script>
/* =========================================================================
   FOCUSED WEAK-AREAS DRILL (50 Q) — built from the 4th score report.
   Heavy on: Computations/Closing, Contracts, Taxes, Mortgage Types,
   Brokerage, Residential Mortgages. Math questions include a step-by-step
   worked re-computation (the `work` array) shown after answering.
   Choice: t=text, e=why right/wrong, k=correct.  Optional work=[steps].
   ========================================================================= */
const BANK = [

/* ===== COMPUTATIONS & CLOSING (12) — all worked ===== */
{d:"Computations & Closing",q:"A home sells for $342,500. The state documentary stamp tax on the DEED is $0.70 per $100 of price. The deed doc-stamp tax is:",
 work:["Price ÷ $100 = $342,500 ÷ 100 = <b>3,425</b> taxable units","Deed rate = <b>$0.70</b> per unit","3,425 × $0.70 = <b>$2,397.50</b>"],ch:[
 {t:"$2,397.50",e:"3,425 units × $0.70 = $2,397.50 — correct.",k:true},
 {t:"$1,198.75",e:"That uses the $0.35 NOTE rate, not the $0.70 deed rate.",k:false},
 {t:"$3,425.00",e:"That is just the number of $100 units; multiply by $0.70.",k:false},
 {t:"$239.75",e:"Decimal slip — the rate is $0.70, not $0.07, per $100.",k:false}]},

{d:"Computations & Closing",q:"A property sells for $283,450. Deed doc stamps are $0.70 per $100, and any fraction of $100 rounds UP. The deed doc-stamp tax is:",
 work:["Round price UP to the next $100: $283,450 → <b>$283,500</b>","$283,500 ÷ $100 = <b>2,835</b> units","2,835 × $0.70 = <b>$1,984.50</b>"],ch:[
 {t:"$1,984.50",e:"After rounding up to $283,500, 2,835 × $0.70 = $1,984.50 — correct.",k:true},
 {t:"$1,984.15",e:"This forgot to round the fraction UP to the next $100.",k:false},
 {t:"$992.25",e:"That uses the $0.35 note rate instead of the $0.70 deed rate.",k:false},
 {t:"$2,834.50",e:"That is the unit count area, not the tax.",k:false}]},

{d:"Computations & Closing",q:"A buyer signs a new $185,000 mortgage/note. Find the TOTAL of the note doc stamps ($0.35/$100) plus the intangible tax (2 mills = $0.002).",
 work:["Note stamps: $185,000 ÷ 100 = 1,850 × $0.35 = <b>$647.50</b>","Intangible: $185,000 × 0.002 = <b>$370.00</b>","Total = $647.50 + $370.00 = <b>$1,017.50</b>"],ch:[
 {t:"$1,017.50",e:"$647.50 note stamps + $370.00 intangible = $1,017.50 — correct.",k:true},
 {t:"$647.50",e:"That is only the note doc stamps; add the intangible tax.",k:false},
 {t:"$370.00",e:"That is only the intangible tax; add the note doc stamps.",k:false},
 {t:"$1,295.00",e:"That wrongly uses the $0.70 deed rate on the note.",k:false}]},

{d:"Computations & Closing",q:"A new mortgage is $312,000. The Florida intangible tax is 2 mills ($0.002 per $1). The intangible tax is:",
 work:["Intangible rate = 2 mills = <b>$0.002</b> per $1","$312,000 × 0.002 = <b>$624.00</b>"],ch:[
 {t:"$624.00",e:"$312,000 × 0.002 = $624 — correct.",k:true},
 {t:"$1,092.00",e:"That uses the $0.35/$100 note rate, not the intangible rate.",k:false},
 {t:"$312.00",e:"That is only 1 mill; the rate is 2 mills.",k:false},
 {t:"$6,240.00",e:"Decimal slip — 2 mills is $0.002, not $0.02.",k:false}]},

{d:"Computations & Closing",q:"Annual property taxes are $4,380, unpaid (arrears), 365-day method. The seller owns the property for 200 days of the tax year. The proration entry is:",
 work:["Daily rate = $4,380 ÷ 365 = <b>$12.00/day</b>","Seller's 200 days: 200 × $12.00 = <b>$2,400</b>","Arrears = seller hasn't paid yet → <b>DEBIT seller, CREDIT buyer</b>"],ch:[
 {t:"$2,400 debit to the seller",e:"$12/day × 200 = $2,400; in arrears the seller owes it, so debit seller / credit buyer — correct.",k:true},
 {t:"$2,400 credit to the seller",e:"The amount is right but the direction is wrong — in arrears it is a debit to the seller.",k:false},
 {t:"$1,980 debit to the seller",e:"That uses 165 days; the seller owns 200 days here.",k:false},
 {t:"$12 debit to the seller",e:"$12 is only the daily rate, not the 200-day total.",k:false}]},

{d:"Computations & Closing",q:"A home sells for $415,000 with a 6% total commission. The TOTAL commission is:",
 work:["Commission = sale price × rate","$415,000 × 0.06 = <b>$24,900</b>"],ch:[
 {t:"$24,900",e:"$415,000 × 0.06 = $24,900 — correct.",k:true},
 {t:"$2,490",e:"That is 0.6%, not 6%.",k:false},
 {t:"$4,150",e:"That is 1%, not 6%.",k:false},
 {t:"$49,800",e:"That is 12%, double the rate.",k:false}]},

{d:"Computations & Closing",q:"Sale price $389,000, commission 7%, split 50/50 between the listing and selling brokers. The selling broker pays the sales associate 70% of its half. The associate receives:",
 work:["Total commission: $389,000 × 0.07 = <b>$27,230</b>","Selling side's half: $27,230 ÷ 2 = <b>$13,615</b>","Associate's 70%: $13,615 × 0.70 = <b>$9,530.50</b>"],ch:[
 {t:"$9,530.50",e:"Half of $27,230 is $13,615; 70% of that is $9,530.50 — correct.",k:true},
 {t:"$13,615",e:"That is the whole selling-side half, before the associate's 70%.",k:false},
 {t:"$4,084.50",e:"That is the broker's retained 30%, not the associate's share.",k:false},
 {t:"$19,061",e:"That takes 70% of the full commission instead of one half.",k:false}]},

{d:"Computations & Closing",q:"A seller wants to NET $250,000 after paying a 6% commission and $3,500 in other closing costs. The sale price must be about:",
 work:["Seller needs net + costs first: $250,000 + $3,500 = <b>$253,500</b>","Commission is 6% of the SALE price: price × (1 − 0.06) = $253,500","Price = $253,500 ÷ 0.94 = <b>$269,680.85</b>"],ch:[
 {t:"$269,680.85",e:"$253,500 ÷ 0.94 = $269,680.85 — correct.",k:true},
 {t:"$268,750",e:"That just adds 6% of the net; commission is a % of the higher sale price.",k:false},
 {t:"$265,500",e:"That omits the proper gross-up of the commission.",k:false},
 {t:"$253,500",e:"That is the net plus costs, before accounting for commission.",k:false}]},

{d:"Computations & Closing",q:"A buyer purchases a $360,000 home with a 75% loan-to-value loan. The down payment is:",
 work:["Loan = price × LTV = $360,000 × 0.75 = <b>$270,000</b>","Down payment = price − loan = $360,000 − $270,000 = <b>$90,000</b>"],ch:[
 {t:"$90,000",e:"$360,000 − $270,000 loan = $90,000 down — correct.",k:true},
 {t:"$270,000",e:"That is the loan amount, not the down payment.",k:false},
 {t:"$9,000",e:"That is only 2.5% of the price.",k:false},
 {t:"$72,000",e:"That uses a 20% down assumption, not 25%.",k:false}]},

{d:"Computations & Closing",q:"A lender charges 2.5 discount points on a $264,000 loan. One point equals 1% of the loan. The cost of the points is:",
 work:["1 point = 1% of loan = $264,000 × 0.01 = <b>$2,640</b>","2.5 points × $2,640 = <b>$6,600</b>"],ch:[
 {t:"$6,600",e:"2.5 × $2,640 = $6,600 — correct.",k:true},
 {t:"$2,640",e:"That is only one point.",k:false},
 {t:"$660",e:"A point is 1% ($2,640), not 0.1%.",k:false},
 {t:"$26,400",e:"That is 10 points.",k:false}]},

{d:"Computations & Closing",q:"A 5-acre parcel sells for $326,700. The price per square foot is: (1 acre = 43,560 sq ft)",
 work:["Total area = 5 × 43,560 = <b>217,800 sq ft</b>","Price per sq ft = $326,700 ÷ 217,800 = <b>$1.50</b>"],ch:[
 {t:"$1.50",e:"$326,700 ÷ 217,800 sq ft = $1.50 per sq ft — correct.",k:true},
 {t:"$0.30",e:"That divides by 5× too much area.",k:false},
 {t:"$15.00",e:"That is 10× too high — check the decimal.",k:false},
 {t:"$65,340",e:"That is the price per ACRE, not per square foot.",k:false}]},

{d:"Computations & Closing",q:"An investor bought a property for $240,000 and sold it for $300,000. The percent of profit is:",
 work:["Profit = $300,000 − $240,000 = <b>$60,000</b>","% profit = profit ÷ ORIGINAL cost = $60,000 ÷ $240,000","= 0.25 = <b>25%</b>"],ch:[
 {t:"25%",e:"$60,000 ÷ $240,000 (original cost) = 25% — correct.",k:true},
 {t:"20%",e:"That divides by the sale price; profit % uses the original cost.",k:false},
 {t:"60%",e:"That confuses the dollar profit with a percentage.",k:false},
 {t:"125%",e:"That is the sale price as a % of cost, not the profit %.",k:false}]},

/* ===== TAXES AFFECTING REAL ESTATE (6) ===== */
{d:"Taxes Affecting Real Estate",q:"A home is assessed at $325,000 with a $50,000 homestead exemption and a millage rate of 18 mills. The annual tax is:",
 work:["Taxable value = assessed − exemptions = $325,000 − $50,000 = <b>$275,000</b>","18 mills = <b>$0.018</b> per $1","$275,000 × 0.018 = <b>$4,950</b>"],ch:[
 {t:"$4,950",e:"$275,000 taxable × 0.018 = $4,950 — correct.",k:true},
 {t:"$5,850",e:"That forgets to subtract the $50,000 homestead exemption.",k:false},
 {t:"$495",e:"That uses 1.8 mills instead of 18.",k:false},
 {t:"$2,750",e:"That uses 10 mills, not 18.",k:false}]},

{d:"Taxes Affecting Real Estate",q:"A tax rate of 22 mills equals how many dollars per $1,000 of taxable value?",
 work:["1 mill = <b>$1 per $1,000</b> of taxable value","22 mills = 22 × $1 = <b>$22 per $1,000</b>"],ch:[
 {t:"$22 per $1,000",e:"22 mills = $22 per $1,000 — correct.",k:true},
 {t:"$2.20 per $1,000",e:"That treats a mill as $0.10 per $1,000; it is $1 per $1,000.",k:false},
 {t:"$220 per $1,000",e:"Off by a factor of 10.",k:false},
 {t:"$0.22 per $1,000",e:"That treats a mill as one cent per $1,000.",k:false}]},

{d:"Taxes Affecting Real Estate",q:"A property has a taxable value of $180,000 and is taxed at 25 mills. The annual tax is:",
 work:["Taxable ÷ $1,000 = $180,000 ÷ 1,000 = <b>180</b>","Tax = 180 × 25 mills = <b>$4,500</b>"],ch:[
 {t:"$4,500",e:"180 (thousands) × 25 mills = $4,500 — correct.",k:true},
 {t:"$450",e:"That uses 2.5 mills instead of 25.",k:false},
 {t:"$45,000",e:"Off by a factor of 10 — recheck the mill value.",k:false},
 {t:"$720",e:"Not a valid result for this rate.",k:false}]},

{d:"Taxes Affecting Real Estate",q:"The SECOND $25,000 of Florida's homestead exemption does NOT apply to:",ch:[
 {t:"School district taxes",e:"The second $25,000 exempts non-school taxes only, so school taxes still apply — correct.",k:true},
 {t:"County taxes",e:"The second tier does reduce county (non-school) taxes.",k:false},
 {t:"City/municipal taxes",e:"The second tier does reduce municipal (non-school) taxes.",k:false},
 {t:"All taxes equally",e:"It specifically excludes school taxes.",k:false}]},

{d:"Taxes Affecting Real Estate",q:"A new streetlight system is paid for only by the owners on the streets that benefit from it. This charge is a:",ch:[
 {t:"Special assessment",e:"A special assessment is a non-ad-valorem charge on benefiting properties — correct.",k:true},
 {t:"Ad valorem tax",e:"Ad valorem taxes fund general government based on value, not a single improvement.",k:false},
 {t:"Documentary stamp tax",e:"Doc stamps are transfer taxes paid at closing.",k:false},
 {t:"Intangible tax",e:"The intangible tax applies to new mortgages.",k:false}]},

{d:"Taxes Affecting Real Estate",q:"Farmland that qualifies for Florida's agricultural ('greenbelt') classification is assessed based on its:",ch:[
 {t:"Agricultural use value",e:"Greenbelt land is taxed on its use value, which lowers the tax — correct.",k:true},
 {t:"Highest-and-best-use market value",e:"The greenbelt benefit avoids taxing it at full market/development value.",k:false},
 {t:"Replacement cost",e:"Replacement cost is an appraisal method, not the greenbelt basis.",k:false},
 {t:"Most recent sale price",e:"Use value, not sale price, sets the agricultural assessment.",k:false}]},

/* ===== TYPES OF MORTGAGES & SOURCES OF FINANCING (6) ===== */
{d:"Mortgage Types & Financing",q:"The FHA minimum down payment is 3.5%. On a $250,000 home, the minimum FHA down payment is:",
 work:["FHA minimum down = <b>3.5%</b> of price","$250,000 × 0.035 = <b>$8,750</b>"],ch:[
 {t:"$8,750",e:"$250,000 × 0.035 = $8,750 — correct.",k:true},
 {t:"$50,000",e:"That is 20%, a conventional figure, not the FHA minimum.",k:false},
 {t:"$5,000",e:"That is only 2%, below the 3.5% minimum.",k:false},
 {t:"$25,000",e:"That is 10%, not the FHA minimum.",k:false}]},

{d:"Mortgage Types & Financing",q:"A loan that carries NO government insurance or guarantee is a:",ch:[
 {t:"Conventional loan",e:"Conventional loans have no FHA insurance or VA guarantee — correct.",k:true},
 {t:"FHA loan",e:"An FHA loan is insured by the FHA.",k:false},
 {t:"VA loan",e:"A VA loan is guaranteed by the VA.",k:false},
 {t:"USDA loan",e:"A USDA loan is government-backed.",k:false}]},

{d:"Mortgage Types & Financing",q:"On a conventional loan, PMI can generally be removed once the loan-to-value reaches:",ch:[
 {t:"80% LTV (the borrower has 20% equity)",e:"PMI is tied to the 20%-equity / 80%-LTV threshold — correct.",k:true},
 {t:"95% LTV",e:"At 95% LTV the borrower still has only 5% equity; PMI remains.",k:false},
 {t:"50% LTV",e:"PMI is normally gone well before this point.",k:false},
 {t:"100% LTV",e:"At 100% LTV there is no equity at all.",k:false}]},

{d:"Mortgage Types & Financing",q:"VA loans are available to:",ch:[
 {t:"Eligible veterans and service members",e:"VA loans are limited to those with eligible military service — correct.",k:true},
 {t:"Any buyer at all",e:"VA eligibility requires qualifying military service.",k:false},
 {t:"Only first-time buyers",e:"There is no first-time-buyer limit; eligibility is service-based.",k:false},
 {t:"Only investors",e:"VA loans are for owner-occupant veterans, not investors.",k:false}]},

{d:"Mortgage Types & Financing",q:"A buyer earns $6,000 gross per month. Using a 28% housing (front-end) ratio, the maximum monthly PITI payment is:",
 work:["Front-end ratio = <b>28%</b> of gross monthly income","$6,000 × 0.28 = <b>$1,680</b> maximum PITI"],ch:[
 {t:"$1,680",e:"$6,000 × 0.28 = $1,680 — correct.",k:true},
 {t:"$2,160",e:"That is the 36% total-debt (back-end) ratio, not the housing ratio.",k:false},
 {t:"$600",e:"That is only 10% of income.",k:false},
 {t:"$1,200",e:"That is 20%, not the 28% housing ratio.",k:false}]},

{d:"Mortgage Types & Financing",q:"Fannie Mae and Freddie Mac operate in the:",ch:[
 {t:"Secondary mortgage market (they buy existing loans)",e:"They purchase loans, giving lenders liquidity — correct.",k:true},
 {t:"Primary market, lending directly to buyers",e:"Direct lending to buyers is the primary market.",k:false},
 {t:"Appraisal industry",e:"They are not appraisers.",k:false},
 {t:"Title insurance business",e:"They are not title insurers.",k:false}]},

/* ===== REAL ESTATE CONTRACTS (9) ===== */
{d:"Real Estate Contracts",q:"A contract signed by a person who has been legally declared mentally incompetent is:",ch:[
 {t:"Void",e:"A contract with an adjudicated incompetent party is void — no valid contract exists, correct.",k:true},
 {t:"Voidable by the seller",e:"An adjudicated incompetent makes it void, not merely voidable.",k:false},
 {t:"Fully valid and binding",e:"Capacity is required; this party lacks it.",k:false},
 {t:"Unenforceable but valid",e:"It is void due to lack of capacity, not merely unenforceable.",k:false}]},

{d:"Real Estate Contracts",q:"A buyer defaults and, per the contract, the seller keeps the earnest money deposit. This remedy is:",ch:[
 {t:"Liquidated damages",e:"A pre-agreed amount kept on default is liquidated damages — correct.",k:true},
 {t:"Specific performance",e:"That forces the sale to close, not forfeiture of a deposit.",k:false},

/* ===================== QUIZ ENGINE ===================== */
const LETTERS=["A","B","C","D"];
const PASS=75;
let order=[], cur=0, score=0, answered=0;
let results=[];

function shuffle(a){
  const arr=a.slice();
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}
function buildOrder(){
  order = shuffle(BANK.map((q,i)=>i)).map(i=>{
    const q=BANK[i];
    return {d:q.d, q:q.q, work:q.work||null, ch:shuffle(q.ch)};
  });
}

function render(){
  const total=order.length;
  const item=order[cur];
  document.getElementById("counter").textContent=`Question ${cur+1} of ${total}`;
  document.getElementById("liveScore").textContent=`Score: ${score}/${answered}`;
  document.getElementById("progressBar").style.width=((cur)/total*100)+"%";

  const choicesHtml=item.ch.map((c,idx)=>`
    <li class="choice" data-idx="${idx}" data-correct="${c.k}">
      <span class="letter">${LETTERS[idx]}</span>
      <span class="ctext">${c.t}</span>
      <span class="expl ${c.k?'good':'bad'}" id="expl-${idx}"></span>
    </li>`).join("");

  const workHtml = item.work ? `<div class="work"><div class="wt">📐 Worked solution</div><ol>${
      item.work.map(s=>`<li>${s}</li>`).join("")}</ol></div>` : "";

  document.getElementById("quiz").innerHTML=`
    <span class="domain">${item.d}</span>
    <p class="qtext">${item.q}</p>
    <ul class="choices" id="choices">${choicesHtml}</ul>
    <div class="verdict" id="verdict"></div>
    ${workHtml}
    <div class="nav">
      <button class="btn next" id="nextBtn">${cur+1<total?'Next Question →':'See My Results →'}</button>
    </div>`;

  item.ch.forEach((c,idx)=>{ document.getElementById("expl-"+idx).textContent=c.e; });

  document.querySelectorAll("#choices .choice").forEach(el=>{
    el.addEventListener("click",()=>onAnswer(el));
  });
  document.getElementById("nextBtn").addEventListener("click",next);
  window.scrollTo({top:0,behavior:"smooth"});
}

function onAnswer(el){
  const choices=document.getElementById("choices");
  if(choices.classList.contains("answered")) return;
  choices.classList.add("answered");
  const picked = el.dataset.correct==="true";
  answered++;
  if(picked) score++;
  results.push({domain:order[cur].d, correct:picked});

  document.querySelectorAll("#choices .choice").forEach(c=>{
    if(c.dataset.correct==="true") c.classList.add("correct");
    else c.classList.add("dim");
  });
  if(!picked){ el.classList.remove("dim"); el.classList.add("wrong"); }

  const v=document.getElementById("verdict");
  v.textContent = picked ? "✓ Correct" : "✗ Incorrect";
  v.classList.add(picked?"good":"bad");
  document.getElementById("liveScore").textContent=`Score: ${score}/${answered}`;
}

function next(){
  if(cur+1<order.length){ cur++; render(); }
  else showResults();
}

function showResults(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("progressBar").style.width="100%";
  document.getElementById("counter").textContent="Complete";
  const pct=Math.round(score/order.length*100);
  const pass=pct>=PASS;

  const dom={};
  results.forEach(r=>{
    dom[r.domain]=dom[r.domain]||{c:0,t:0};
    dom[r.domain].t++; if(r.correct) dom[r.domain].c++;
  });
  const rows=Object.keys(dom).sort((a,b)=> (dom[a].c/dom[a].t) - (dom[b].c/dom[b].t)).map(k=>{
    const p=Math.round(dom[k].c/dom[k].t*100);
    const cls=p<60?"lo":(p<75?"mid":"hi");
    const barcol=p<60?"#ea4335":(p<75?"#f4a000":"#34a853");
    return `<tr>
      <td>${k}<div class="barwrap"><div style="width:${p}%;background:${barcol}"></div></div></td>
      <td class="pct ${cls}">${dom[k].c}/${dom[k].t}<br>${p}%</td>
    </tr>`;
  }).join("");

  const r=document.getElementById("results");
  r.style.display="block";
  r.innerHTML=`
    <div class="result-card ${pass?'pass':'fail'}">
      <div class="result-badge">${pass?'On Track':'Keep Drilling'}</div>
      <div class="result-score">${pct}%</div>
      <div>${score} of ${order.length} correct on your weak areas</div>
      <div class="result-sub">${pass
        ? "At or above 75% on the toughest topics — that's exactly where you need to be. Run it again to lock it in."
        : `The real exam needs 75%. On these weak areas you're at ${pct}% — keep drilling the red rows below until they turn green.`}</div>
    </div>
    <h3 class="bd">Your score by topic (weakest first)</h3>
    <table class="dom">${rows}</table>
    <div class="nav" style="margin-top:22px;">
      <button class="btn secondary" onclick="location.reload()">↻ Retake (reshuffles)</button>
    </div>
    <p class="footnote">Focused weak-areas drill (50 Q), built from the latest score report. Math questions show a
    step-by-step worked solution. Questions reshuffle each attempt.
    <br><a href="drill2.html" style="color:#088395;font-weight:700;">Drill B (50 more)</a> &nbsp;·&nbsp;
    <a href="full.html" style="color:#088395;font-weight:700;">Full 100-question mock exam</a><br>
    Study tool only — not affiliated with DBPR or Pearson VUE; verify current statutes and figures before relying on them.</p>`;
  document.getElementById("liveScore").textContent=`Score: ${score}/${order.length}`;
  window.scrollTo({top:0,behavior:"smooth"});
}

buildOrder();
render();
</script>
