<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a4d68">
<title>Florida Real Estate Sales Associate — Practice Exam (100 Q)</title>
<style>
  :root{
    --navy:#0a4d68; --teal:#088395; --sky:#05bfdb; --bg:#f3f6f8;
    --green:#1e8e3e; --green-bg:#e6f4ea; --green-bd:#34a853;
    --red:#c5221f; --red-bg:#fce8e6; --red-bd:#ea4335;
    --ink:#1f2d33; --muted:#5f7178; --card:#ffffff; --line:#dde6ea;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.45;
    padding:0 0 40px; -webkit-font-smoothing:antialiased;
  }
  header{
    background:linear-gradient(135deg,var(--navy),var(--teal));
    color:#fff; padding:16px 18px 14px; position:sticky; top:0; z-index:10;
    box-shadow:0 2px 10px rgba(0,0,0,.12);
  }
  header h1{font-size:16px; margin:0 0 10px; font-weight:700; letter-spacing:.2px;}
  .meta{display:flex; justify-content:space-between; align-items:center; font-size:13px; font-weight:600;}
  .meta .score{background:rgba(255,255,255,.18); padding:3px 10px; border-radius:20px;}
  .progress{height:7px; background:rgba(255,255,255,.25); border-radius:6px; margin-top:10px; overflow:hidden;}
  .progress > div{height:100%; width:0; background:var(--sky); border-radius:6px; transition:width .3s ease;}
  main{max-width:680px; margin:0 auto; padding:18px 16px 0;}
  .domain{display:inline-block; font-size:11px; font-weight:700; text-transform:uppercase;
    letter-spacing:.5px; color:var(--teal); background:#e3f2f5; padding:4px 9px; border-radius:6px; margin-bottom:12px;}
  .qtext{font-size:18px; font-weight:600; margin:0 0 18px; line-height:1.4;}
  .choices{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:11px;}
  .choice{
    display:flex; align-items:flex-start; gap:11px; background:var(--card);
    border:2px solid var(--line); border-radius:13px; padding:14px 15px; cursor:pointer;
    font-size:16px; transition:border-color .15s, background .15s; user-select:none;
  }
  .choice:active{transform:scale(.995);}
  .choice .letter{
    flex:0 0 26px; height:26px; border-radius:50%; background:#eef3f5; color:var(--navy);
    font-weight:700; font-size:14px; display:flex; align-items:center; justify-content:center; margin-top:1px;
  }
  .choice .ctext{flex:1;}
  .choice.correct{border-color:var(--green-bd); background:var(--green-bg);}
  .choice.correct .letter{background:var(--green-bd); color:#fff;}
  .choice.wrong{border-color:var(--red-bd); background:var(--red-bg);}
  .choice.wrong .letter{background:var(--red-bd); color:#fff;}
  .choice.dim{opacity:.85;}
  .answered .choice{cursor:default;}
  .expl{font-size:13.5px; margin-top:9px; padding-left:37px; display:none; line-height:1.4;}
  .answered .expl{display:block;}
  .expl.good{color:var(--green);}
  .expl.bad{color:var(--red);}
  .verdict{margin:18px 0 4px; font-weight:700; font-size:16px; display:none;}
  .answered .verdict{display:block;}
  .verdict.good{color:var(--green);} .verdict.bad{color:var(--red);}
  .nav{margin:22px 0 8px; display:flex; gap:12px;}
  button.btn{
    flex:1; border:none; border-radius:12px; padding:15px; font-size:16px; font-weight:700;
    background:var(--navy); color:#fff; cursor:pointer; transition:opacity .15s, background .15s;
  }
  button.btn:disabled{opacity:.4; cursor:default;}
  button.btn.secondary{background:#e0e8ec; color:var(--navy);}
  button.btn.next{display:none;}
  .answered ~ .nav button.btn.next{display:block;}
  #results{display:none;}
  .result-card{background:var(--card); border-radius:16px; padding:24px 20px; text-align:center; box-shadow:0 2px 10px rgba(0,0,0,.06);}
  .result-score{font-size:54px; font-weight:800; margin:6px 0;}
  .result-card.pass .result-score{color:var(--green);}
  .result-card.fail .result-score{color:var(--red);}
  .result-badge{display:inline-block; font-size:15px; font-weight:800; padding:7px 18px; border-radius:30px; text-transform:uppercase; letter-spacing:1px;}
  .result-card.pass .result-badge{background:var(--green-bg); color:var(--green);}
  .result-card.fail .result-badge{background:var(--red-bg); color:var(--red);}
  .result-sub{color:var(--muted); font-size:14px; margin-top:10px;}
  h3.bd{font-size:15px; margin:26px 0 10px; color:var(--navy);}
  table.dom{width:100%; border-collapse:collapse; font-size:13.5px; background:var(--card); border-radius:12px; overflow:hidden;}
  table.dom td{padding:10px 12px; border-bottom:1px solid var(--line); vertical-align:middle;}
  table.dom tr:last-child td{border-bottom:none;}
  table.dom td.pct{text-align:right; font-weight:700; white-space:nowrap;}
  .pct.lo{color:var(--red);} .pct.mid{color:#c77800;} .pct.hi{color:var(--green);}
  .barwrap{background:#eef3f5; height:6px; border-radius:4px; margin-top:5px; overflow:hidden;}
  .barwrap>div{height:100%; border-radius:4px;}
  .footnote{font-size:12px; color:var(--muted); text-align:center; margin:24px 8px 0; line-height:1.5;}
</style>
</head>

  <div class="meta">
    <span id="counter">Question 1 of 100</span>

  </div>

</header>

<script>

   ========================================================================= */
const BANK = [

/* === I. THE REAL ESTATE BUSINESS (1) === */
{d:"The Real Estate Business",q:"Property management, appraisal, financing, and brokerage are examples of:",ch:[
 {t:"Specialized areas within the real estate business",e:"These are recognized specializations within the industry — correct.",k:true},
 {t:"Government regulatory agencies",e:"They are professional fields, not agencies.",k:false},
 {t:"Types of deeds",e:"Deeds are title documents, not business areas.",k:false},
 {t:"Financing instruments",e:"They are business areas, not financing instruments.",k:false}]},

/* === II. LICENSE LAW & QUALIFICATIONS FOR LICENSURE (6) === */
{d:"License Law & Qualifications",q:"The pre-license course required to qualify for a Florida sales associate license is:",ch:[
 {t:"63 hours",e:"The sales associate pre-license course is 63 hours — correct.",k:true},
 {t:"14 hours",e:"14 hours is the biennial continuing-education requirement.",k:false},
 {t:"45 hours",e:"45 hours is the sales associate post-license requirement.",k:false},
 {t:"72 hours",e:"Not a Florida requirement.",k:false}]},

{d:"License Law & Qualifications",q:"The Florida sales associate state exam requires a passing score of:",ch:[
 {t:"75%",e:"A score of 75 out of 100 is required to pass — correct.",k:true},
 {t:"70%",e:"The threshold is 75, not 70.",k:false},
 {t:"80%",e:"The threshold is 75, not 80.",k:false},
 {t:"60%",e:"The threshold is 75, not 60.",k:false}]},

{d:"License Law & Qualifications",q:"Before the FIRST renewal, a new sales associate must complete post-license education of:",ch:[
 {t:"45 hours",e:"45 hours of post-license education is required before the first renewal, or the license becomes void — correct.",k:true},
 {t:"14 hours",e:"14 hours is the continuing education for later renewals.",k:false},
 {t:"60 hours",e:"60 hours is the broker post-license requirement.",k:false},
 {t:"28 hours",e:"Not a Florida figure.",k:false}]},

{d:"License Law & Qualifications",q:"After the first renewal, continuing education required each renewal period is:",ch:[
 {t:"14 hours every 2 years",e:"14 hours of CE are required each two-year cycle — correct.",k:true},
 {t:"45 hours every 2 years",e:"45 hours is the one-time post-license requirement.",k:false},
 {t:"30 hours annually",e:"Incorrect hours and frequency.",k:false},
 {t:"None ever",e:"CE is mandatory.",k:false}]},

{d:"License Law & Qualifications",q:"A minimum requirement to apply for a Florida sales associate license is being at least:",ch:[
 {t:"18 years old with a high school diploma or equivalent",e:"Applicants must be 18+ and hold a high school diploma or equivalent — correct.",k:true},
 {t:"21 years old with a college degree",e:"A degree isn't required and the age is 18.",k:false},
 {t:"16 years old",e:"16 is too young.",k:false},
 {t:"A U.S. citizen",e:"Lawful presence is required, but U.S. citizenship is not.",k:false}]},

{d:"License Law & Qualifications",q:"Which person is EXEMPT from needing a Florida real estate license?",ch:[
 {t:"An owner selling or leasing their own property",e:"Owners dealing in their own property are exempt from licensure — correct.",k:true},
 {t:"A person selling homes for others for compensation",e:"Selling for others for pay requires a license.",k:false},
 {t:"A person who lists properties for a fee",e:"Listing property for a fee is licensed activity.",k:false},
 {t:"An assistant who negotiates sales for a broker",e:"Negotiating sales requires a license.",k:false}]},

/* === III. REAL ESTATE LICENSE LAW & COMMISSION RULES (2) === */
{d:"License Law & Commission Rules",q:"The Florida Real Estate Commission (FREC) is composed of how many members?",ch:[
 {t:"7 members",e:"FREC has 7 members appointed by the Governor — correct.",k:true},
 {t:"5 members",e:"Incorrect — FREC has 7.",k:false},
 {t:"9 members",e:"Incorrect — FREC has 7.",k:false},
 {t:"11 members",e:"Incorrect — FREC has 7.",k:false}]},

{d:"License Law & Commission Rules",q:"FREC operates within which state department?",ch:[
 {t:"Department of Business and Professional Regulation (DBPR)",e:"FREC sits in the DBPR's Division of Real Estate — correct.",k:true},
 {t:"Department of Revenue",e:"That department handles taxes.",k:false},
 {t:"HUD",e:"HUD is a federal agency.",k:false},
 {t:"Department of State",e:"That department handles other matters.",k:false}]},

/* === IV. AUTHORIZED RELATIONSHIPS, DUTIES & DISCLOSURES (7) === */
{d:"Authorized Relationships",q:"In a Florida residential transaction, the presumed brokerage relationship is:",ch:[
 {t:"Transaction broker",e:"Florida presumes a transaction-broker relationship unless another is established in writing — correct.",k:true},
 {t:"Single agent",e:"Single agency must be established by written disclosure.",k:false},
 {t:"No brokerage relationship",e:"That too must be specifically established.",k:false},
 {t:"Dual agent",e:"Dual agency is illegal in Florida.",k:false}]},

{d:"Authorized Relationships",q:"Which duty is owed by a SINGLE AGENT but NOT by a transaction broker?",ch:[
 {t:"Loyalty",e:"Loyalty (with obedience and full confidentiality) is owed only by a single agent — correct.",k:true},
 {t:"Dealing honestly and fairly",e:"Honesty and fair dealing are owed in both relationships.",k:false},
 {t:"Accounting for all funds",e:"Accounting for funds is required in both.",k:false},
 {t:"Using skill, care, and diligence",e:"This is owed in both relationships.",k:false}]},

{d:"Authorized Relationships",q:"Full confidentiality, obedience, and full disclosure are duties owed by a:",ch:[
 {t:"Single agent",e:"These are among the single agent's duties to the principal — correct.",k:true},
 {t:"Transaction broker",e:"A transaction broker owes only LIMITED confidentiality, not these full duties.",k:false},
 {t:"Customer with no brokerage relationship",e:"Such a customer is owed honesty and fair dealing, not these.",k:false},
 {t:"Title company",e:"A title company has no agency duties to the parties.",k:false}]},

{d:"Authorized Relationships",q:"Dual agency in Florida is:",ch:[
 {t:"Illegal",e:"Florida law prohibits dual agency — correct.",k:true},
 {t:"The default relationship",e:"The default is transaction broker.",k:false},
 {t:"Required in all sales",e:"It is banned, not required.",k:false},
 {t:"Allowed with oral consent",e:"It cannot be consented to at all.",k:false}]},

{d:"Authorized Relationships",q:"The single agent notice must be given to the principal:",ch:[
 {t:"Before or at the time of entering the representation agreement",e:"The disclosure must be made before or at the time of entering the agreement — correct.",k:true},
 {t:"Only at closing",e:"Closing is too late.",k:false},
 {t:"Never — it is optional",e:"It is mandatory for single agency.",k:false},
 {t:"Only if the customer asks",e:"It is required regardless of whether the customer asks.",k:false}]},

{d:"Authorized Relationships",q:"A single agent may change to a transaction broker during a transaction only if:",ch:[
 {t:"The principal signs the transition disclosure before the change",e:"Transition requires the principal's signed consent before the relationship changes — correct.",k:true},
 {t:"Never — transition is prohibited",e:"Transition is allowed with proper disclosure and consent.",k:false},
 {t:"It happens automatically at closing",e:"It is not automatic; consent is required first.",k:false},
 {t:"The other party agrees",e:"It is the represented principal's consent that is required, not the other party's.",k:false}]},

{d:"Authorized Relationships",q:"Knowingly misstating a material fact about a property is:",ch:[
 {t:"Misrepresentation (fraud), a violation",e:"Knowingly misstating a material fact is actionable misrepresentation/fraud — correct.",k:true},
 {t:"Permitted if the buyer never asks",e:"Concealing material facts is also a violation; you cannot hide them.",k:false},
 {t:"Acceptable puffing",e:"Puffing is exaggerated opinion, not a false statement of material fact.",k:false},
 {t:"Only an ethics issue with no legal consequence",e:"It carries legal and license consequences, not just ethical ones.",k:false}]},

/* === V. REAL ESTATE BROKERAGE ACTIVITIES & PROCEDURES (12) === */
{d:"Brokerage Activities",q:"A sales associate may legally be paid a commission by:",ch:[
 {t:"Only their employing broker",e:"A sales associate may be paid only by the broker who employs them — correct.",k:true},
 {t:"The seller directly",e:"Accepting pay directly from a principal is a violation.",k:false},
 {t:"The buyer directly",e:"Accepting pay directly from a principal is a violation.",k:false},
 {t:"Any party to the transaction",e:"Compensation must flow through the employing broker.",k:false}]},

{d:"Brokerage Activities",q:"Earnest money delivered to a broker must be deposited into escrow no later than:",ch:[
 {t:"The end of the 3rd business day after receipt",e:"The broker must deposit funds by the end of the 3rd business day — correct.",k:true},
 {t:"Within 24 hours",e:"The associate must deliver promptly, but the deposit deadline is the 3rd business day.",k:false},
 {t:"Within 10 business days",e:"Too long — the deadline is the 3rd business day.",k:false},
 {t:"At closing",e:"Far too late; funds go to escrow by the 3rd business day.",k:false}]},

{d:"Brokerage Activities",q:"Mixing escrow (trust) funds with the broker's personal or operating money is called:",ch:[
 {t:"Commingling",e:"Commingling is improperly mixing trust funds with personal/business funds — correct.",k:true},
 {t:"Conversion",e:"Conversion is USING another's escrow funds for one's own purposes.",k:false},
 {t:"Novation",e:"Novation substitutes parties or contracts.",k:false},
 {t:"Estoppel",e:"Estoppel bars a party from contradicting prior conduct.",k:false}]},

{d:"Brokerage Activities",q:"When a broker receives conflicting demands on escrowed funds, FREC must be notified in writing within:",ch:[
 {t:"15 business days",e:"The broker must notify FREC within 15 business days of conflicting demands — correct.",k:true},
 {t:"30 business days",e:"30 business days is the deadline to institute a settlement procedure, not the notice.",k:false},
 {t:"10 calendar days",e:"Incorrect timeframe.",k:false},
 {t:"60 days",e:"Incorrect timeframe.",k:false}]},

{d:"Brokerage Activities",q:"After notifying FREC of conflicting escrow demands, the broker must institute a settlement procedure within:",ch:[
 {t:"30 business days",e:"Within 30 business days the broker must choose mediation, arbitration, interpleader, or an EDO — correct.",k:true},
 {t:"15 business days",e:"15 business days is the FREC-notification deadline.",k:false},
 {t:"90 days",e:"Incorrect timeframe.",k:false},
 {t:"5 business days",e:"Incorrect timeframe.",k:false}]},

{d:"Brokerage Activities",q:"A broker may keep up to how much of their OWN money in a sales escrow account to cover bank service charges?",ch:[
 {t:"$1,000",e:"Up to $1,000 of personal funds may be kept in a sales escrow account — correct.",k:true},
 {t:"$5,000",e:"$5,000 is the limit for a property-management escrow account.",k:false},
 {t:"$0 — none is allowed",e:"A small cushion is permitted.",k:false},
 {t:"Unlimited",e:"Amounts above the limit are commingling.",k:false}]},

{d:"Brokerage Activities",q:"An active broker's registered office must include:",ch:[
 {t:"At least one enclosed room and a proper entrance sign",e:"A principal office needs at least one enclosed room and proper signage — correct.",k:true},
 {t:"Only a P.O. box",e:"A post office box is not a registered office.",k:false},
 {t:"A residence with no sign",e:"A proper entrance sign is required.",k:false},
 {t:"Anonymous shared space with no registration",e:"Offices must be registered with the DBPR.",k:false}]},

{d:"Brokerage Activities",q:"A commission dispute between two cooperating brokers is properly resolved by:",ch:[
 {t:"Arbitration or civil court — not FREC",e:"FREC does not settle commission disputes; brokers use arbitration or court — correct.",k:true},
 {t:"FREC, which awards the commission",e:"FREC regulates licensees but does not decide who gets a commission.",k:false},
 {t:"The Real Estate Recovery Fund",e:"That fund compensates harmed consumers, not broker fee disputes.",k:false},
 {t:"A citation",e:"Citations address minor statutory violations, not fee disputes.",k:false}]},

{d:"Brokerage Activities",q:"Federal antitrust law prohibits competing brokers from:",ch:[
 {t:"Agreeing with each other to fix commission rates",e:"Conspiring to fix prices/commissions violates antitrust law — correct.",k:true},
 {t:"Independently setting their own fees",e:"Each broker may set their own fees independently.",k:false},
 {t:"Competing on price",e:"Price competition is exactly what antitrust law protects.",k:false},
 {t:"Advertising their services",e:"Advertising is permitted.",k:false}]},

{d:"Brokerage Activities",q:"A sales associate's advertising must:",ch:[
 {t:"Include the brokerage (firm) name",e:"All advertising must include the brokerage's name — correct.",k:true},
 {t:"Use only the associate's personal name",e:"The brokerage name is required, not just the associate's name.",k:false},
 {t:"Omit all license information",e:"Advertising must not be misleading about licensure.",k:false},
 {t:"Imply the associate owns the listings",e:"Associates work for the broker and do not own listings.",k:false}]},

{d:"Brokerage Activities",q:"For conflicting escrow demands, which is NOT an authorized settlement procedure?",ch:[
 {t:"Keeping the disputed funds for the brokerage",e:"Keeping disputed funds is conversion — never an authorized procedure, correct answer.",k:true},
 {t:"Mediation",e:"Mediation is an authorized option.",k:false},
 {t:"Arbitration",e:"Arbitration is an authorized option.",k:false},
 {t:"Requesting an escrow disbursement order (EDO) from FREC",e:"An EDO from FREC is authorized.",k:false}]},

{d:"Brokerage Activities",q:"A kickback or undisclosed referral fee paid to a licensee is:",ch:[
 {t:"Prohibited unless properly disclosed",e:"Undisclosed kickbacks/referral fees are prohibited under RESPA and license law — correct.",k:true},
 {t:"Always allowed",e:"Undisclosed referral fees are not allowed.",k:false},
 {t:"Required on every transaction",e:"They are not required and are often illegal.",k:false},
 {t:"Only an issue for appraisers",e:"It applies to licensees, not just appraisers.",k:false}]},

/* === VI. VIOLATIONS OF LICENSE LAW, PENALTIES & PROCEDURES (2) === */
{d:"Violations & Penalties",q:"Practicing real estate in Florida without a license is a:",ch:[
 {t:"Third-degree felony",e:"Unlicensed real estate practice is a third-degree felony — correct.",k:true},
 {t:"First-degree misdemeanor only",e:"It is elevated beyond a misdemeanor to a felony.",k:false},
 {t:"Civil infraction only",e:"It carries criminal penalties, not just civil.",k:false},
 {t:"Not a violation",e:"It is clearly a violation.",k:false}]},

{d:"Violations & Penalties",q:"The maximum a single claimant may recover from the Florida Real Estate Recovery Fund for one transaction is:",ch:[
 {t:"$50,000",e:"The Recovery Fund pays up to $50,000 per transaction — correct.",k:true},
 {t:"$25,000",e:"Too low.",k:false},
 {t:"$150,000",e:"$150,000 is the per-licensee aggregate cap across multiple judgments.",k:false},
 {t:"$100,000",e:"Not the correct per-transaction limit.",k:false}]},

/* === VII. FEDERAL & STATE LAWS PERTAINING TO REAL ESTATE (4) === */
{d:"Federal & State Laws",q:"The federal Fair Housing Act prohibits discrimination based on all of the following EXCEPT:",ch:[
 {t:"Occupation",e:"Occupation is not a protected class under the Fair Housing Act — correct answer.",k:true},
 {t:"Race",e:"Race is a protected class.",k:false},
 {t:"Religion",e:"Religion is a protected class.",k:false},
 {t:"Familial status",e:"Familial status is a protected class.",k:false}]},

{d:"Federal & State Laws",q:"The seventh federally protected class under the Fair Housing Act (besides race, color, religion, national origin, sex, and familial status) is:",ch:[
 {t:"Handicap (disability)",e:"Disability/handicap is the seventh federally protected class — correct.",k:true},
 {t:"Age",e:"Age is not a federal Fair Housing protected class.",k:false},
 {t:"Income level",e:"Income is not a federal protected class.",k:false},
 {t:"Marital status",e:"Marital status is not a federal Fair Housing class.",k:false}]},

{d:"Federal & State Laws",q:"Steering, blockbusting, and redlining are prohibited by the:",ch:[
 {t:"Fair Housing Act",e:"These discriminatory practices violate the Fair Housing Act — correct.",k:true},
 {t:"Statute of Frauds",e:"That concerns written contracts.",k:false},
 {t:"Regulation Z",e:"Reg Z governs lending disclosures.",k:false},
 {t:"Statute of Limitations",e:"That sets time limits to file suit.",k:false}]},

{d:"Federal & State Laws",q:"RESPA primarily regulates:",ch:[
 {t:"Settlement (closing) costs and prohibits kickbacks",e:"RESPA governs disclosure of settlement costs and bans referral kickbacks — correct.",k:true},
 {t:"Property tax rates",e:"Tax rates are set locally.",k:false},
 {t:"Zoning decisions",e:"Zoning is a local government function.",k:false},
 {t:"Appraiser licensing",e:"Appraisal licensing is separate.",k:false}]},

/* === VIII. PROPERTY RIGHTS (8) === */
{d:"Property Rights",q:"The 'bundle of rights' of real property ownership includes all of the following EXCEPT:",ch:[
 {t:"The right to violate zoning laws",e:"Ownership never includes a right to break the law — correct answer.",k:true},
 {t:"The right to possess",e:"Possession is a core ownership right.",k:false},
 {t:"The right to exclude others",e:"Excluding others is part of the bundle.",k:false},
 {t:"The right to transfer (dispose)",e:"The right to dispose/transfer is included.",k:false}]},

{d:"Property Rights",q:"The highest and most complete form of ownership is:",ch:[
 {t:"Fee simple absolute",e:"Fee simple absolute is ownership of indefinite duration with the fullest rights — correct.",k:true},
 {t:"A life estate",e:"A life estate ends at death.",k:false},
 {t:"A leasehold",e:"A leasehold is a tenant's temporary right, not ownership.",k:false},
 {t:"An easement",e:"An easement is only a right to use, not ownership.",k:false}]},

{d:"Property Rights",q:"An estate that lasts only for the lifetime of a named person is a:",ch:[
 {t:"Life estate",e:"A life estate is measured by someone's life — correct.",k:true},
 {t:"Estate for years",e:"That has a fixed term with definite dates.",k:false},
 {t:"Fee simple defeasible",e:"That is ownership subject to a condition, not a lifetime.",k:false},
 {t:"Tenancy at will",e:"That is a leasehold of indefinite, terminable duration.",k:false}]},

{d:"Property Rights",q:"A neighbor's recorded right to cross your land via a driveway is a(n):",ch:[
 {t:"Easement",e:"An easement grants the right to use another's land for a defined purpose — correct.",k:true},
 {t:"Fee simple interest",e:"Fee simple is full ownership.",k:false},
 {t:"Encroachment",e:"An encroachment is an unauthorized intrusion, not a granted right.",k:false},
 {t:"Estate",e:"An estate is a possessory/ownership interest.",k:false}]},

{d:"Property Rights",q:"An item of personal property permanently attached to real estate becomes a:",ch:[
 {t:"Fixture, which conveys with the property",e:"An affixed item becomes a fixture and transfers with the property — correct.",k:true},
 {t:"Chattel the seller always keeps",e:"Once affixed it generally stays unless excluded by contract.",k:false},
 {t:"Trade fixture in every case",e:"Trade fixtures apply to commercial tenants, not all attachments.",k:false},
 {t:"An emblement",e:"Emblements are annual crops, a separate concept.",k:false}]},

 {t:"Joint tenancy",e:"Joint tenancy carries the right of survivorship — correct.",k:true},

 {t:"Tenancy at sufferance",e:"That is a holdover-tenant lease situation.",k:false}]},

{d:"Property Rights",q:"Tenancy in common differs from joint tenancy in that:",ch:[
 {t:"There is no right of survivorship; a deceased owner's share passes to heirs",e:"Tenancy in common has no survivorship — shares pass to the estate/heirs, correct.",k:true},
 {t:"Only one person can own the property",e:"Tenancy in common involves two or more owners.",k:false},
 {t:"All shares must be exactly equal",e:"Ownership shares can be unequal.",k:false},
 {t:"It always includes survivorship",e:"Survivorship is the feature of joint tenancy, not tenancy in common.",k:false}]},

{d:"Property Rights",q:"A married couple in Florida who own their home together with survivorship typically hold title as:",ch:[
 {t:"Tenants by the entirety",e:"Tenancy by the entirety is available to married couples and includes survivorship — correct.",k:true},
 {t:"Tenants in common",e:"Tenancy in common lacks survivorship.",k:false},
 {t:"Owners in severalty",e:"Severalty is sole ownership by one person.",k:false},
 {t:"Joint tenants with no survivorship",e:"That arrangement omits the survivorship couples receive by the entirety.",k:false}]},

/* === IX. TITLES, DEEDS & OWNERSHIP RESTRICTIONS (7) === */
{d:"Titles & Deeds",q:"Which deed gives the buyer (grantee) the GREATEST protection?",ch:[
 {t:"General warranty deed",e:"It includes the fullest covenants protecting against all title defects — correct.",k:true},
 {t:"Quitclaim deed",e:"A quitclaim conveys only whatever interest the grantor has, with no warranties.",k:false},
 {t:"Special warranty deed",e:"It covers only the grantor's period of ownership.",k:false},
 {t:"Bargain and sale deed",e:"It implies ownership but offers limited warranties.",k:false}]},

{d:"Titles & Deeds",q:"A deed that conveys only whatever interest the grantor may have, with no warranties, is a:",ch:[
 {t:"Quitclaim deed",e:"It transfers any interest the grantor holds with no guarantees — correct.",k:true},
 {t:"General warranty deed",e:"That carries full covenants.",k:false},
 {t:"Special warranty deed",e:"That warrants only the grantor's ownership period.",k:false},
 {t:"Trustee's deed",e:"A trustee's deed conveys trust property by a trustee.",k:false}]},

{d:"Titles & Deeds",q:"For a deed to be valid, it must be:",ch:[
 {t:"In writing and signed by the grantor",e:"A valid deed must be written and signed by the grantor, then delivered and accepted — correct.",k:true},
 {t:"Signed by the grantee",e:"The grantee need not sign the deed.",k:false},
 {t:"Notarized by the buyer",e:"Notarization is for recording and is not done by the buyer.",k:false},
 {t:"Recorded to be valid between the parties",e:"Recording gives public notice but is not required for validity between the parties.",k:false}]},

{d:"Titles & Deeds",q:"A restrictive covenant (deed restriction) is:",ch:[
 {t:"A private limitation on land use, enforced by other owners or an HOA",e:"Deed restrictions are private controls enforced by parties such as an HOA — correct.",k:true},
 {t:"A government zoning law",e:"Zoning is a public (government) control, not a private covenant.",k:false},
 {t:"A type of mortgage",e:"It is not a financing instrument.",k:false},
 {t:"A federal tax",e:"It is not a tax.",k:false}]},

{d:"Titles & Deeds",q:"Title insurance protects the insured against:",ch:[
 {t:"Title defects that existed before the policy date",e:"Title insurance covers undiscovered defects existing before issuance — correct.",k:true},
 {t:"Future physical damage to the building",e:"Physical damage is covered by hazard insurance, not title.",k:false},
 {t:"The borrower's failure to pay the mortgage",e:"Nonpayment is the borrower's obligation, not a title defect.",k:false},
 {t:"Declines in the property's market value",e:"Market value changes are not title matters.",k:false}]},

{d:"Titles & Deeds",q:"Real property transferred by a valid will when the owner dies is acquired by:",ch:[
 {t:"Devise (testate succession)",e:"Real property passed by will is a devise; the owner died testate — correct.",k:true},
 {t:"Escheat",e:"Escheat is when the state takes property left with no heirs.",k:false},
 {t:"Adverse possession",e:"That is acquiring title by open, hostile use over time.",k:false},
 {t:"Eminent domain",e:"That is a government taking for public use.",k:false}]},

{d:"Titles & Deeds",q:"Acquiring title by openly, continuously, and without permission using another's land for the statutory period is:",ch:[
 {t:"Adverse possession",e:"Open, notorious, continuous, hostile use for the statutory period can transfer title — correct.",k:true},
 {t:"An easement by necessity",e:"That grants use (such as access), not ownership.",k:false},
 {t:"A life estate",e:"A life estate is created by grant, not by trespass.",k:false},
 {t:"A quitclaim conveyance",e:"A quitclaim is a voluntary transfer document.",k:false}]},

/* === X. LEGAL DESCRIPTIONS (5) === */
{d:"Legal Descriptions",q:"A legal description that uses compass directions and distances from a point of beginning is the:",ch:[
 {t:"Metes and bounds method",e:"Metes and bounds traces boundaries by direction and distance back to the point of beginning — correct.",k:true},
 {t:"Lot and block method",e:"That references a recorded plat.",k:false},
 {t:"Government (rectangular) survey",e:"That uses townships, ranges, and sections.",k:false},
 {t:"Street address",e:"A street address is not a legal description.",k:false}]},

{d:"Legal Descriptions",q:"In the government survey system, one section contains:",ch:[
 {t:"640 acres",e:"A section is one square mile = 640 acres — correct.",k:true},
 {t:"36 acres",e:"A township has 36 sections, not 36 acres.",k:false},
 {t:"160 acres",e:"160 acres is a quarter section.",k:false},
 {t:"1 acre",e:"An acre is far smaller than a section.",k:false}]},

{d:"Legal Descriptions",q:"A township is made up of how many sections?",ch:[
 {t:"36",e:"A township is 6 by 6 miles, divided into 36 one-square-mile sections — correct.",k:true},
 {t:"16",e:"Incorrect.",k:false},
 {t:"640",e:"640 is the number of acres in a section.",k:false},
 {t:"100",e:"Incorrect.",k:false}]},

{d:"Legal Descriptions",q:"The 'lot and block' method describes property by reference to:",ch:[
 {t:"A recorded subdivision plat map",e:"Lot and block references a recorded subdivision map — correct.",k:true},
 {t:"Township and range lines",e:"That is the rectangular survey.",k:false},
 {t:"Metes and bounds calls",e:"That is a separate method.",k:false},
 {t:"The public land survey baseline",e:"Baselines are part of the rectangular survey.",k:false}]},

{d:"Legal Descriptions",q:"A parcel described as the SW 1/4 of the NE 1/4 of a section contains how many acres?",ch:[
 {t:"40 acres",e:"640 acres x 1/4 x 1/4 = 40 acres — correct.",k:true},
 {t:"160 acres",e:"160 acres is one quarter of a section, only one division.",k:false},
 {t:"10 acres",e:"10 acres would be 1/4 of 1/4 of 1/4.",k:false},
 {t:"80 acres",e:"Incorrect; two quarter-divisions yield 40 acres.",k:false}]},

/* === XI. REAL ESTATE CONTRACTS (12) === */
{d:"Real Estate Contracts",q:"Which of the following is NOT required for a real estate sales contract to be valid?",ch:[
 {t:"An earnest money deposit",e:"Earnest money is customary but not legally required for validity — correct answer.",k:true},
 {t:"Offer and acceptance (mutual assent)",e:"Mutual assent is an essential element.",k:false},
 {t:"Consideration",e:"Consideration is an essential element.",k:false},
 {t:"A lawful object",e:"A legal purpose is an essential element.",k:false}]},

{d:"Real Estate Contracts",q:"Why must a contract for the sale of real property be in writing?",ch:[
 {t:"The Statute of Frauds requires it",e:"The Statute of Frauds requires real estate sale contracts to be written to be enforceable — correct.",k:true},
 {t:"The Statute of Limitations requires it",e:"That sets time limits to sue, not the writing requirement.",k:false},
 {t:"RESPA requires it",e:"RESPA governs settlement cost disclosures, not contract form.",k:false},
 {t:"It does not — oral contracts are fully enforceable",e:"Oral real estate sale contracts are generally unenforceable.",k:false}]},

{d:"Real Estate Contracts",q:"An option contract is best classified as what kind of contract?",ch:[
 {t:"Unilateral",e:"Only the seller is bound to hold the offer open; the buyer is not obligated to buy — unilateral, correct.",k:true},
 {t:"Bilateral",e:"Bilateral means both parties promise to perform, which an option does not.",k:false},
 {t:"Implied",e:"An option is an express, written agreement, not implied.",k:false},
 {t:"Void",e:"An option is valid, not void.",k:false}]},

{d:"Real Estate Contracts",q:"Under which listing does the broker earn a commission no matter who finds the buyer — even the owner?",ch:[
 {t:"Exclusive right of sale",e:"Guarantees the listing broker a commission regardless of who procures the buyer — correct.",k:true},
 {t:"Exclusive agency",e:"Under exclusive agency the owner can sell themselves and owe no commission.",k:false},
 {t:"Open listing",e:"An open listing pays only the broker who actually finds the buyer.",k:false},
 {t:"Net listing",e:"A net listing concerns how the commission is figured, not who earns it.",k:false}]},

{d:"Real Estate Contracts",q:"A 16-year-old signs a contract to buy a condo. The contract is:",ch:[
 {t:"Voidable by the minor",e:"A minor lacks capacity, so the contract is voidable at the minor's option — correct.",k:true},
 {t:"Void",e:"Void means no contract ever existed; a minor's contract can stand if the minor chooses.",k:false},
 {t:"Valid and fully binding",e:"It is not fully binding because the minor can disaffirm it.",k:false},
 {t:"Automatically enforceable against the minor",e:"It cannot be enforced against the minor, who may disaffirm.",k:false}]},

{d:"Real Estate Contracts",q:"A 'time is of the essence' clause means:",ch:[
 {t:"Stated deadlines must be met exactly",e:"The clause makes dates strict; missing one is a breach — correct.",k:true},
 {t:"The contract has no deadlines",e:"It does the opposite — it enforces deadlines.",k:false},
 {t:"Closing can occur at any time",e:"It requires timely performance, not flexibility.",k:false},
 {t:"The contract is an option",e:"It has nothing to do with option contracts.",k:false}]},

{d:"Real Estate Contracts",q:"A buyer defaults and the seller keeps the earnest money as the agreed remedy. This is an example of:",ch:[
 {t:"Liquidated damages",e:"A pre-agreed amount kept on default is liquidated damages — correct.",k:true},
 {t:"Specific performance",e:"Specific performance forces the sale to close, not forfeiture of a deposit.",k:false},
 {t:"Compensatory damages",e:"Those require proving the actual loss suffered.",k:false},
 {t:"Punitive damages",e:"Punitive damages punish wrongdoing and are not a typical contract remedy.",k:false}]},

{d:"Real Estate Contracts",q:"A contract in which both parties have completely performed all obligations is:",ch:[
 {t:"Executed",e:"Executed means all obligations are completed — correct.",k:true},
 {t:"Executory",e:"Executory means something still remains to be done.",k:false},
 {t:"Void",e:"Void means unenforceable from the start.",k:false},
 {t:"Unilateral",e:"Unilateral describes a one-promise contract, not completion status.",k:false}]},

{d:"Real Estate Contracts",q:"A buyer responds to a seller's offer by changing the price. This counteroffer:",ch:[
 {t:"Rejects and terminates the original offer",e:"A counteroffer rejects the original and substitutes a new offer — correct.",k:true},
 {t:"Accepts the original offer",e:"It is not an acceptance because the terms were changed.",k:false},
 {t:"Has no effect on the original offer",e:"It ends the power to later accept the original.",k:false},
 {t:"Immediately forms a binding contract",e:"No contract forms until the counteroffer itself is accepted.",k:false}]},

{d:"Real Estate Contracts",q:"A contract that is missing an essential element and has no legal effect is:",ch:[
 {t:"Void",e:"A void contract lacks an essential element and has no legal force — correct.",k:true},
 {t:"Voidable",e:"Voidable contracts are valid until a party elects to cancel.",k:false},
 {t:"Valid",e:"Valid means fully enforceable.",k:false},
 {t:"Executed",e:"Executed describes a completed contract.",k:false}]},

{d:"Real Estate Contracts",q:"Under an exclusive AGENCY listing, the seller owes a commission:",ch:[
 {t:"Only if a broker (not the seller) procures the buyer",e:"In exclusive agency the owner may sell themselves with no commission, but a broker-procured sale is owed — correct.",k:true},
 {t:"To the broker no matter who sells",e:"That describes an exclusive right of sale.",k:false},
 {t:"Never, under any circumstances",e:"A broker who finds the buyer is owed.",k:false},
 {t:"Only to the buyer's agent",e:"The listing commission is not limited to a buyer's agent.",k:false}]},

{d:"Real Estate Contracts",q:"A listing in which the broker keeps everything received above a price the seller sets is a:",ch:[
 {t:"Net listing (legal in Florida but discouraged)",e:"A net listing lets the broker keep proceeds above the seller's net — legal in Florida but risky and discouraged, correct.",k:true},
 {t:"Open listing",e:"An open listing pays the procuring broker a set commission.",k:false},
 {t:"Exclusive right of sale",e:"That pays a commission regardless of who sells.",k:false},
 {t:"Option listing",e:"That is not a standard listing type.",k:false}]},

/* === XII. RESIDENTIAL MORTGAGES (9) === */
{d:"Residential Mortgages",q:"Florida is which type of state regarding mortgages?",ch:[
 {t:"A lien-theory state",e:"In Florida the borrower keeps title and the lender holds a lien — correct.",k:true},
 {t:"A title-theory state",e:"Title-theory states give the lender title until paid — not Florida.",k:false},
 {t:"An intermediary-theory state",e:"Florida does not use the intermediary theory.",k:false},
 {t:"A deed-of-trust state",e:"Florida uses mortgages, not deeds of trust, as the primary instrument.",k:false}]},

{d:"Residential Mortgages",q:"Which document is the borrower's personal promise to repay the debt?",ch:[
 {t:"The promissory note",e:"The note is the borrower's promise to repay — correct.",k:true},
 {t:"The mortgage",e:"The mortgage is the security instrument pledging the property, not the promise itself.",k:false},
 {t:"The deed",e:"A deed transfers ownership.",k:false},
 {t:"The satisfaction",e:"A satisfaction releases the mortgage after payoff.",k:false}]},

{d:"Residential Mortgages",q:"Pledging property as security for a loan while keeping possession of it is called:",ch:[
 {t:"Hypothecation",e:"Hypothecation is pledging property as collateral without giving up possession — correct.",k:true},
 {t:"Subordination",e:"Subordination changes a lien's priority.",k:false},
 {t:"Novation",e:"Novation substitutes a new party or contract.",k:false},
 {t:"Alienation",e:"Alienation is the transfer of title.",k:false}]},

{d:"Residential Mortgages",q:"Foreclosures in Florida are:",ch:[
 {t:"Judicial (through the courts)",e:"Florida requires judicial foreclosure — correct.",k:true},
 {t:"Non-judicial (power of sale)",e:"Florida does not use non-judicial power-of-sale foreclosure.",k:false},
 {t:"Strict foreclosure only",e:"Strict foreclosure is not Florida's method.",k:false},
 {t:"Not permitted",e:"Foreclosure is allowed through the courts.",k:false}]},

{d:"Residential Mortgages",q:"A clause that lets the lender demand the full balance if the property is sold is the:",ch:[
 {t:"Due-on-sale (alienation) clause",e:"It lets the lender call the loan due upon transfer — correct.",k:true},
 {t:"Defeasance clause",e:"Defeasance requires the lender to release the lien when paid in full.",k:false},
 {t:"Subordination clause",e:"Subordination lowers a lien's priority.",k:false},
 {t:"Escalation clause",e:"An escalation clause raises rent or rate, unrelated to a sale.",k:false}]},

{d:"Residential Mortgages",q:"Private mortgage insurance (PMI) is generally required on a conventional loan when the down payment is less than:",ch:[
 {t:"20%",e:"Conventional loans usually require PMI when less than 20% is put down — correct.",k:true},
 {t:"3.5%",e:"3.5% is the FHA minimum down payment, which carries MIP, not PMI.",k:false},
 {t:"50%",e:"Not the standard PMI threshold.",k:false},
 {t:"10%",e:"PMI tracks the 20% equity threshold, not 10%.",k:false}]},

{d:"Residential Mortgages",q:"The clause requiring the lender to release the lien once the loan is fully paid is the:",ch:[
 {t:"Defeasance clause",e:"Defeasance requires the lender to release the mortgage upon full payment — correct.",k:true},
 {t:"Acceleration clause",e:"Acceleration makes the whole balance due upon default.",k:false},
 {t:"Due-on-sale clause",e:"That triggers payoff upon transfer.",k:false},
 {t:"Prepayment penalty clause",e:"That charges the borrower for paying off early.",k:false}]},

{d:"Residential Mortgages",q:"An 'amortized' loan is one in which:",ch:[
 {t:"Principal and interest are paid down over the term",e:"Amortized loans gradually retire principal and interest — correct.",k:true},
 {t:"Only interest is paid until a balloon payment",e:"That describes an interest-only/straight loan.",k:false},
 {t:"The balance grows over time",e:"That describes negative amortization.",k:false},
 {t:"No payments are made until maturity",e:"Amortized loans require periodic payments.",k:false}]},

{d:"Residential Mortgages",q:"A buyer takes title 'subject to' an existing mortgage. Who remains primarily liable on the note?",ch:[
 {t:"The original borrower (seller)",e:"Taking title subject to the loan leaves the original borrower liable; the buyer is not — correct.",k:true},
 {t:"The new buyer",e:"The buyer would be liable only under an assumption with novation.",k:false},
 {t:"The lender",e:"The lender is the creditor, not the obligor.",k:false},
 {t:"No one",e:"Someone remains liable — the original borrower.",k:false}]},

/* === XIII. TYPES OF MORTGAGES & SOURCES OF FINANCING (4) === */
{d:"Mortgage Types & Financing",q:"FHA loans are:",ch:[
 {t:"Insured by the FHA",e:"FHA insures loans made by approved lenders against default — correct.",k:true},
 {t:"Guaranteed by the VA",e:"The VA guarantees; the FHA insures — different agencies.",k:false},
 {t:"Made directly by the federal government",e:"FHA does not lend directly; private lenders do.",k:false},
 {t:"Always interest-only",e:"FHA loans are typically amortized.",k:false}]},

{d:"Mortgage Types & Financing",q:"A key benefit of a VA loan for eligible veterans is:",ch:[
 {t:"No down payment is required",e:"VA loans can finance up to 100%, often with no down payment — correct.",k:true},
 {t:"The loan never has to be repaid",e:"The loan must still be repaid.",k:false},
 {t:"No credit review of any kind",e:"Lenders still evaluate creditworthiness.",k:false},
 {t:"It is available to anyone",e:"VA loans are limited to eligible veterans and service members.",k:false}]},

{d:"Mortgage Types & Financing",q:"The secondary mortgage market (e.g., Fannie Mae, Freddie Mac):",ch:[
 {t:"Buys existing loans to give lenders liquidity",e:"It purchases loans so lenders can make more — correct.",k:true},
 {t:"Makes loans directly to consumers",e:"That is the primary market.",k:false},
 {t:"Sets the federal funds rate",e:"The Federal Reserve sets that rate.",k:false},
 {t:"Insures FHA loans",e:"FHA insures its own loans; that is not the secondary market's role.",k:false}]},

{d:"Mortgage Types & Financing",q:"An adjustable-rate mortgage (ARM) sets its interest rate based on:",ch:[
 {t:"An index plus a margin",e:"ARM rates equal an economic index plus the lender's margin and adjust periodically — correct.",k:true},
 {t:"A fixed rate for the entire term",e:"That describes a fixed-rate loan.",k:false},
 {t:"The borrower's credit score alone",e:"The score affects approval, not the ongoing rate formula.",k:false},
 {t:"The appraised value",e:"Appraised value affects LTV, not the rate adjustment.",k:false}]},

/* === XIV. REAL ESTATE RELATED COMPUTATIONS & CLOSING OF TRANSACTIONS (6) === */
{d:"Computations & Closing",q:"A home sells for $285,000. Using Florida's state documentary stamp tax rate on deeds of $0.70 per $100, the deed doc-stamp tax is:",ch:[
 {t:"$1,995.00",e:"$285,000 / $100 = 2,850 units x $0.70 = $1,995 — correct.",k:true},
 {t:"$997.50",e:"$0.35 per $100 is the rate for promissory notes, not deeds.",k:false},
 {t:"$2,850.00",e:"That is the number of $100 units; you still multiply by the $0.70 rate.",k:false},
 {t:"$570.00",e:"This is not a valid deed-tax calculation; it ignores the $0.70 rate.",k:false}]},

{d:"Computations & Closing",q:"The documentary stamp tax on the DEED is customarily paid in Florida by the:",ch:[
 {t:"Seller",e:"The seller customarily pays the deed doc-stamp tax — correct.",k:true},
 {t:"Buyer",e:"The buyer customarily pays the note doc stamps and the intangible tax on a new mortgage.",k:false},
 {t:"Lender",e:"The lender does not pay transfer taxes.",k:false},
 {t:"Listing broker",e:"The broker does not pay transfer taxes.",k:false}]},

{d:"Computations & Closing",q:"On a closing statement, the buyer's earnest money deposit already paid appears as a:",ch:[
 {t:"Credit to the buyer",e:"Money the buyer already paid is credited to the buyer at closing — correct.",k:true},
 {t:"Debit to the buyer",e:"It is not an additional charge to the buyer.",k:false},
 {t:"Credit to the seller",e:"It is not credited to the seller.",k:false},
 {t:"Debit to the seller",e:"It is not a seller charge.",k:false}]},

{d:"Computations & Closing",q:"Annual property taxes are $2,920, unpaid, and the seller owns 90 days of the year (365-day method). Because Florida taxes are paid in arrears, the closing entry is:",ch:[
 {t:"$720 debit to the seller",e:"$2,920 / 365 = $8/day x 90 = $720; in arrears the seller owes it, so it is a debit to seller / credit to buyer — correct.",k:true},
 {t:"$720 credit to the seller",e:"It is a debit, not a credit — the seller has not yet paid the taxes for their period.",k:false},
 {t:"$2,200 debit to the seller",e:"$2,200 is the buyer's remaining-year share, not the seller's 90 days.",k:false},
 {t:"$8 debit to the seller",e:"$8 is the daily rate, not the 90-day total.",k:false}]},

{d:"Computations & Closing",q:"A home sells for $320,000 at a 6% total commission. The listing and selling brokers split it 50/50, and the selling broker pays the associate 60% of its half. The associate receives:",ch:[
 {t:"$5,760",e:"$320,000 x 6% = $19,200; / 2 = $9,600; x 60% = $5,760 — correct.",k:true},
 {t:"$9,600",e:"That is the selling broker's full half, before the associate's split.",k:false},
 {t:"$3,840",e:"$3,840 is the broker's retained 40%, not the associate's share.",k:false},
 {t:"$11,520",e:"This applies 60% to the entire commission instead of one half.",k:false}]},

{d:"Computations & Closing",q:"A seller wants to NET $200,000 after paying a 6% commission. The home must sell for approximately:",ch:[
 {t:"$212,766",e:"Sale price = $200,000 / (1 - 0.06) = $212,766; commission is a % of the sale price — correct.",k:true},
 {t:"$212,000",e:"Adding 6% of the net understates it; commission is based on the higher sale price.",k:false},
 {t:"$188,000",e:"This subtracts commission instead of grossing the price up.",k:false},
 {t:"$206,000",e:"This is not the correct net-price method.",k:false}]},

/* === XV. REAL ESTATE MARKETS & ANALYSIS (1) === */
{d:"Markets & Analysis",q:"When the supply of homes exceeds buyer demand, prices generally:",ch:[
 {t:"Fall, creating a buyer's market",e:"Excess supply relative to demand pushes prices down — correct.",k:true},
 {t:"Rise sharply",e:"Prices rise when demand exceeds supply.",k:false},
 {t:"Stay fixed by law",e:"Prices are not legally fixed.",k:false},
 {t:"Are set by FREC",e:"FREC regulates licensees, not market prices.",k:false}]},

/* === XVI. REAL ESTATE APPRAISAL (8) === */
{d:"Real Estate Appraisal",q:"The three approaches to estimating value are sales comparison, cost, and:",ch:[
 {t:"Income",e:"The income approach is the third method, used for income property — correct.",k:true},
 {t:"Assessment",e:"Assessment is for taxation, not appraisal.",k:false},
 {t:"Liquidation",e:"Liquidation is a sale condition, not an approach.",k:false},
 {t:"Replacement",e:"Replacement cost is a component of the cost approach, not a separate approach.",k:false}]},

{d:"Real Estate Appraisal",q:"In the income approach, value is calculated as:",ch:[
 {t:"Net Operating Income / Capitalization Rate",e:"Value = NOI divided by the cap rate — correct.",k:true},
 {t:"NOI x Capitalization Rate",e:"Multiplying inverts the relationship.",k:false},
 {t:"Gross Income x Cost",e:"Not a valuation formula.",k:false},
 {t:"Price / Monthly Rent",e:"That is a gross rent multiplier, a different tool.",k:false}]},

{d:"Real Estate Appraisal",q:"The principle that a buyer will pay no more than the cost of an equally desirable substitute is the principle of:",ch:[
 {t:"Substitution",e:"Substitution sets the upper limit of value at the cost of an equivalent alternative — correct.",k:true},
 {t:"Conformity",e:"Conformity addresses similarity among nearby properties.",k:false},
 {t:"Progression",e:"Progression is the lift a lesser home gets from better neighbors.",k:false},
 {t:"Contribution",e:"Contribution measures the value a feature adds.",k:false}]},

{d:"Real Estate Appraisal",q:"Loss of value caused by an outdated or poor floor plan is:",ch:[
 {t:"Functional obsolescence",e:"Functional obsolescence is value loss from outdated design within the property — correct.",k:true},
 {t:"Physical deterioration",e:"That is wear and tear.",k:false},
 {t:"External obsolescence",e:"That comes from influences outside the property.",k:false},
 {t:"Economic appreciation",e:"Appreciation is a value increase, not a loss.",k:false}]},

{d:"Real Estate Appraisal",q:"A comparative market analysis (CMA) prepared by a sales associate is:",ch:[
 {t:"An estimate of value, not a formal appraisal",e:"A CMA is a pricing estimate a licensee may prepare, not a certified appraisal — correct.",k:true},
 {t:"A certified appraisal",e:"Only licensed/certified appraisers perform formal appraisals.",k:false},
 {t:"Illegal for licensees to prepare",e:"Licensees may prepare CMAs.",k:false},
 {t:"Equivalent to a USPAP appraisal",e:"A CMA does not meet formal USPAP appraisal standards.",k:false}]},

{d:"Real Estate Appraisal",q:"The sales comparison approach is BEST suited for valuing:",ch:[
 {t:"Single-family homes",e:"Sales comparison works best where similar recent sales exist, such as homes — correct.",k:true},
 {t:"A unique public library",e:"Unique/special-purpose properties rely on the cost approach.",k:false},
 {t:"An apartment complex",e:"Income property is best valued by the income approach.",k:false},
 {t:"A special-purpose factory",e:"Special-purpose buildings use the cost approach.",k:false}]},

{d:"Real Estate Appraisal",q:"The cost approach is MOST appropriate for:",ch:[
 {t:"New or special-purpose properties, such as a school",e:"The cost approach suits new/special-purpose buildings with few comparables — correct.",k:true},
 {t:"A typical resale home",e:"Typical homes use sales comparison.",k:false},
 {t:"A rental apartment building",e:"Rentals use the income approach.",k:false},
 {t:"Vacant land by itself",e:"Land is valued separately; the cost approach values improvements plus land.",k:false}]},

{d:"Real Estate Appraisal",q:"The 'highest and best use' of a property is the use that is:",ch:[
 {t:"Legally permitted, physically possible, financially feasible, and most productive",e:"Highest and best use must meet all four tests — correct.",k:true},
 {t:"Whatever the current owner prefers",e:"Owner preference does not define it.",k:false},
 {t:"Always residential",e:"It varies by property; not always residential.",k:false},
 {t:"The cheapest use to develop",e:"It is the most productive use, not the cheapest.",k:false}]},

/* ===================== QUIZ ENGINE ===================== */
const LETTERS=["A","B","C","D"];
const PASS=75;
let order=[], cur=0, score=0, answered=0;
let results=[];

function shuffle(a){
  const arr=a.slice();
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}
function buildOrder(){
  order = shuffle(BANK.map((q,i)=>i)).map(i=>{
    const q=BANK[i];
    return {d:q.d, q:q.q, ch:shuffle(q.ch)};
  });
}

function render(){
  const total=order.length;
  const item=order[cur];
  document.getElementById("counter").textContent=`Question ${cur+1} of ${total}`;
  document.getElementById("liveScore").textContent=`Score: ${score}/${answered}`;
  document.getElementById("progressBar").style.width=((cur)/total*100)+"%";

  const choicesHtml=item.ch.map((c,idx)=>`
    <li class="choice" data-idx="${idx}" data-correct="${c.k}">
      <span class="letter">${LETTERS[idx]}</span>
      <span class="ctext">${c.t}</span>
      <span class="expl ${c.k?'good':'bad'}" id="expl-${idx}"></span>
    </li>`).join("");

  document.getElementById("quiz").innerHTML=`
    <span class="domain">${item.d}</span>
    <p class="qtext">${item.q}</p>
    <ul class="choices" id="choices">${choicesHtml}</ul>
    <div class="verdict" id="verdict"></div>
    <div class="nav">
      <button class="btn next" id="nextBtn">${cur+1<total?'Next Question →':'See My Results →'}</button>
    </div>`;

  item.ch.forEach((c,idx)=>{ document.getElementById("expl-"+idx).textContent=c.e; });

  document.querySelectorAll("#choices .choice").forEach(el=>{
    el.addEventListener("click",()=>onAnswer(el));
  });
  document.getElementById("nextBtn").addEventListener("click",next);
  window.scrollTo({top:0,behavior:"smooth"});
}

function onAnswer(el){
  const choices=document.getElementById("choices");
  if(choices.classList.contains("answered")) return;
  choices.classList.add("answered");
  const picked = el.dataset.correct==="true";
  answered++;
  if(picked) score++;
  results.push({domain:order[cur].d, correct:picked});

  document.querySelectorAll("#choices .choice").forEach(c=>{
    if(c.dataset.correct==="true") c.classList.add("correct");
    else c.classList.add("dim");
  });
  if(!picked){ el.classList.remove("dim"); el.classList.add("wrong"); }

  const v=document.getElementById("verdict");
  v.textContent = picked ? "✓ Correct" : "✗ Incorrect";
  v.classList.add(picked?"good":"bad");
  document.getElementById("liveScore").textContent=`Score: ${score}/${answered}`;
}

function next(){
  if(cur+1<order.length){ cur++; render(); }
  else showResults();
}

function showResults(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("progressBar").style.width="100%";
  document.getElementById("counter").textContent="Complete";
  const pct=Math.round(score/order.length*100);
  const pass=pct>=PASS;

  const dom={};
  results.forEach(r=>{
    dom[r.domain]=dom[r.domain]||{c:0,t:0};
    dom[r.domain].t++; if(r.correct) dom[r.domain].c++;
  });
  const rows=Object.keys(dom).sort((a,b)=> (dom[a].c/dom[a].t) - (dom[b].c/dom[b].t)).map(k=>{
    const p=Math.round(dom[k].c/dom[k].t*100);
    const cls=p<60?"lo":(p<75?"mid":"hi");
    const barcol=p<60?"#ea4335":(p<75?"#f4a000":"#34a853");
    return `<tr>
      <td>${k}<div class="barwrap"><div style="width:${p}%;background:${barcol}"></div></div></td>
      <td class="pct ${cls}">${dom[k].c}/${dom[k].t}<br>${p}%</td>
    </tr>`;
  }).join("");

  const r=document.getElementById("results");
  r.style.display="block";
  r.innerHTML=`
    <div class="result-card ${pass?'pass':'fail'}">
      <div class="result-badge">${pass?'PASS':'Keep Studying'}</div>
      <div class="result-score">${pct}%</div>
      <div>${score} of ${order.length} correct</div>
      <div class="result-sub">${pass
        ? "Above the 75% passing line — nice work. Run it again to stay sharp."
        : `You need 75% to pass — about ${Math.max(1,PASS-pct)} points away. Focus on the red rows below.`}</div>
    </div>
    <h3 class="bd">Your score by topic (weakest first)</h3>
    <table class="dom">${rows}</table>
    <div class="nav" style="margin-top:22px;">
      <button class="btn secondary" onclick="location.reload()">↻ Retake (questions reshuffle)</button>
    </div>
    <p class="footnote">100-question Florida Sales Associate practice exam. Question counts mirror the official
    DBPR Candidate Information Booklet content outline (19 areas). Questions reshuffle each attempt.
    Study tool only — not affiliated with DBPR or Pearson VUE; verify current statutes and figures before relying on them.</p>`;
  document.getElementById("liveScore").textContent=`Score: ${score}/${order.length}`;
  window.scrollTo({top:0,behavior:"smooth"});
}

buildOrder();
render();
</script>
